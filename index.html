<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TalkingHead</title>
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #202020;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }
  body.production {
    max-width: none;
    margin: 0;
    cursor: none;
  }
  #avatar {
    flex: 1;
    width: 100%;
    min-height: 0;
  }
  #status {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.55);
    border-radius: 6px;
    font-size: 14px;
    pointer-events: none;
  }
  #status.hidden { display: none; }
  #status.error { background: rgba(140, 30, 30, 0.85); }

  /* Dev harm-picker (ALG-14): pick categories -> requestAbsolution -> avatar + LLM respond. */
  #harm-panel {
    padding: 8px 10px;
    background: #141414;
    border-top: 1px solid #2a2a2a;
  }
  body.production #harm-panel { display: none; }
  body.production #status { display: none; }   /* production = avatar view only, no UI/overlays */
  /* Showcase two-window demo: one tap on the oracle unlocks Web Audio (clicks on the form don't). */
  #showcase-audio-prompt {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 40px; font-size: 12px; letter-spacing: 0.06em;
    color: rgba(255,255,255,0.38); text-transform: uppercase;
  }
  #harm-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 6px;
    margin-bottom: 7px;
  }
  #harm-list label {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    font-size: 11px;
    border: 1px solid #333;
    border-radius: 5px;
    background: #111;
    cursor: pointer;
    user-select: none;
  }
  #harm-list label:hover { border-color: #2f7cff; }
  #harm-list input { accent-color: #2f7cff; margin: 0; }
  #harm-actions { display: flex; gap: 8px; align-items: center; }
  #harm-panel button {
    padding: 6px 12px;
    font-size: 13px;
    border: 0;
    border-radius: 6px;
    cursor: pointer;
  }
  #harm-clear { background: #333; color: #fff; }
  #harm-send { background: #2f7cff; color: #fff; }
  #harm-send:disabled { background: #444; cursor: not-allowed; }
</style>
</head>
<body>
  <div id="avatar"></div>
  <div id="status">Loading...</div>
  <div id="harm-panel">
    <div id="harm-list"></div>
    <div id="harm-actions">
      <button id="harm-send" type="button" disabled>Submit</button>
      <button id="harm-clear" type="button">Clear</button>
    </div>
  </div>

  <script src="./config.js" onerror="window.__TH_NO_CONFIG = true"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
    }
  }
  </script>

  <script type="module">
    import { TalkingHead } from "talkinghead";
    import * as THREE from "three";
    import { EffectComposer }  from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass }      from "three/addons/postprocessing/RenderPass.js";
    import { ShaderPass }      from "three/addons/postprocessing/ShaderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
    import { OutputPass }      from "three/addons/postprocessing/OutputPass.js";
    import { installVoiceFX, applyVoiceParams, applyTtsParams, VOICE_PRESETS } from "./voice-fx.js";
    import { speakShaped, installAudioFacial, setAffect, preSpeechSettle, loadReverbIR, cleanForSpeechClient } from "./speech-realism.js";

    // PROD realism config — locked 2026-06-20 from the audition lab. Drives the shaped visemes +
    // viseme-coupled jaw (speakShaped) and the audio-coupled facial layer + pre-speech settle
    // (installAudioFacial / preSpeechSettle). Eyes/brow/jaw move; NO head motion (hieratic-safe).
    const PROD_REALISM = {
      visemeLevel: 0.85, closureBoost: true, adaptive: true, adaptiveAmt: 0.3,
      jawMode: "viseme", jawCouple: 0.06,
      audioFacial: true, browAmt: 0.16, browAsym: 0.3, jawAmt: 0.12, gain: 1, gapBlink: true,
      saccade: true, saccadeAmt: 0.045, gazeDown: true, gazeDownAmt: 0.06,
      preBreath: true, preBreathMs: 450,
      affect: true, affectBrow: 0.1, affectFrown: 0.07,
    };
    let __facial = null;   // audio-coupled facial controller (installed after the avatar loads)

    const isProduction =
      window.TALKINGHEAD_PRODUCTION === true ||
      new URLSearchParams(location.search).has("production");
    const isShowcase = new URLSearchParams(location.search).has("showcase");

    if (isProduction) {
      document.body.classList.add("production");
    }

    const statusEl = document.getElementById("status");
    const avatarEl = document.getElementById("avatar");

    function showStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
      statusEl.classList.toggle("error", isError);
    }
    function hideStatus() {
      statusEl.classList.add("hidden");
    }

    function scheduleRecovery(reason) {
      console.error("[avatar] fatal error, reloading in 3s:", reason);
      setTimeout(() => location.reload(), 3000);
    }

    function handleFatalError(reason) {
      if (isProduction) {
        scheduleRecovery(reason);
      } else {
        showStatus(String(reason), true);
      }
    }

    if (isProduction) {
      document.addEventListener("contextmenu", (ev) => ev.preventDefault());
      document.addEventListener("keydown", (ev) => {
        const key = ev.key;
        if (
          key === "F5" ||
          key === "F11" ||
          key === "F12" ||
          (ev.ctrlKey && (key === "r" || key === "R")) ||
          (ev.ctrlKey && ev.shiftKey && (key === "i" || key === "I" || key === "j" || key === "J")) ||
          (ev.metaKey && (key === "r" || key === "R")) ||
          (ev.metaKey && ev.altKey && (key === "i" || key === "I"))
        ) {
          ev.preventDefault();
        }
      });
    }

    // TTS goes through a same-origin server-side proxy (ALG-8): the Google API key lives only in
    // deploy/tts-proxy/.env, never in client source or the network tab. No client key is required.
    // The proxy also serves these static files, so "/tts" resolves on the page's own origin.
    const ttsProxy = window.TALKINGHEAD_TTS_PROXY || "/tts";

    // --- Leveled-oracle render-layer tunables (ported from oracle-leveled-preview.html) ---
    const TAU = Math.PI*2, fract = x => x - Math.floor(x);

    const ICON = window.ICON = {
      // pale-porcelain + gold-leaf direction (ref-matched): gold-push pulled back so the flesh stays pale.
      // crackle/tooth pulled WAY down so the body reads as smooth porcelain and the dark ground stays clean
      // (the old high crack values mosaic'd the flat background); vignette/ground darkened for the deep-corner falloff.
      crackStrength:0.06, crackScale:58.0, toothAmount:0.02, terreVerte:0.05,
      duoAmount:0.10, desat:0.92, vignette:1.05, exposure:0.84,
      groundR:0.05, groundG:0.04, groundB:0.028,
      craqGlobal:0.0,   // icon overlay texture REMOVED (was a whole-frame craquelure); body crackle back to smooth porcelain
    };

    // Warm "sanctuary" atmosphere: a radial glow bursting behind the halo + a floor pool of light, with the
    // figure masked out by luminance so the glow fills the dark ground (and corners) without blowing out the body.
    const ATMO = window.ATMO = {
      on:1, glowCx:0.50, glowCy:0.84, haloAmt:0.85, haloTight:5.0,
      floorAmt:0.90, floorTop:0.32, floorWidth:0.60,
      warmR:1.0, warmG:0.84, warmB:0.52,
      bgLo:0.30, bgHi:0.55,
    };

    // Leveled (representational) layer knobs — combine/refine these live
    const LV = window.LV = {
      on:1,
      // gold-field grade effects zeroed for the pale full-body figure (clean ground like the reference);
      // kept as knobs so the bureaucratic gold-field can be dialed back if framing returns to a bust.
      ledgerAmt:0.0, ledgerRows:36.0, ledgerCols:26.0,    // gold-field as ruled indulgence form
      rayAmt:0.0, rayN:46.0, rayFall:0.46,                 // analytic glory sunburst behind head
      crossAmt:0.0,                                        // cruciform nimbus bars
      headCx:0.55, headCy:0.57,                            // note: vUv.y is 0 at bottom, 1 at top
      heartCx:0.50, heartCy:0.25, heartScale:0.092, heartYoff:0.62,  // Sacred Heart on the sternum
      heartAmt:0.85, thornAmt:0.35, crossTop:0.40,
      bpm:62.0, beatDepth:1.0,                             // lub-dub
      // discrete emblems MOVED from the gold field onto the body as gold-leaf tattoos (baked into OracleSkin).
      // amounts zeroed here; geometry/uniforms kept so they can be dialed back into the field if wanted.
      christoAmt:0.0, christoScale:0.10, christoCx:0.22, christoCy:0.30,
      mandorlaAmt:0.0, mandorlaCx:0.52, mandorlaCy:0.45, mandorlaScale:0.30,
      tallyAmt:0.0, letterAmt:0.0, letterRadius:0.165,
      eyeAmt:0.0, eyeN:14.0, eyeRadius:0.225, eyeScale:0.026,   // ophanim eye-ring removed (set eyeAmt>0 to bring it back)
    };

    // --- Hieratic idle ---------------------------------------------------------------------------------------
    // Replaces TalkingHead's default idle (it cycles the figure through casual weight-shift stances:
    // side/hip/wide — relaxed, human, anti-iconic — and its breathing is a no-op because this GLB has no
    // chestInhale morph). Instead we lock a frontal, symmetric "oracle" standing pose and layer subtle life
    // (slow breath + barely-there sway) onto the Mixamo spine/axial bones every frame — the same rig the
    // gestures drive. Everything here is live-tunable on window.IDLE.
    const IDLE = window.IDLE = {
      on:1,
      breathBpm:11.0,                                              // slow, meditative breaths per minute
      breathSpine1:0.034, breathSpine2:0.026, breathNeck:0.012, breathHead:0.010,  // chest-expansion amplitudes (rad)
      swayPeriod:26.0,                                             // seconds for one lateral sway cycle
      swayLean:0.013, swayTurn:0.010, swayHead:0.011,              // spine lean / hip turn / head drift (rad)
    };
    const __idleQ = new THREE.Quaternion();
    const __axX = new THREE.Vector3(1,0,0), __axY = new THREE.Vector3(0,1,0), __axZ = new THREE.Vector3(0,0,1);

    const head = new TalkingHead(avatarEl, {
      // Same-origin proxy that injects the Google key server-side and forwards to
      // v1beta1/text:synthesize. ttsApikey is intentionally omitted so TalkingHead appends no ?key=.
      ttsEndpoint: ttsProxy,
      ttsTrimEnd: 400,   // clip the dead tail after the last viseme (tuned in oracle-voice-audition.html)
      lipsyncModules: ["en"],
      cameraView: "head",
      lightAmbientColor: 0xfff1dc, lightAmbientIntensity: 0.42,
      lightDirectColor: 0xffe9c8, lightDirectIntensity: 0.62,
      lightDirectPhi: 0.6, lightDirectTheta: 0.2, lightSpotIntensity: 0,
    });

    const avatarUrl = window.TALKINGHEAD_AVATAR_URL || "./avatar.glb";

    // Showcase: speech must wait for a user gesture IN THIS WINDOW (form clicks don't count).
    let __audioReadyResolve;
    const __audioReady = isShowcase
      ? new Promise((resolve) => { __audioReadyResolve = resolve; })
      : Promise.resolve();

    async function ensureAudioUnlocked() {
      if (!head.armature) return false;
      if (!head.isRunning) head.start();
      const ctx = head.audioCtx;
      if (!ctx) return false;
      if (ctx.state === "running") return true;
      if (ctx.state !== "suspended" && ctx.state !== "interrupted") return false;
      const resume = ctx.resume();
      const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error("audio resume timeout")), 1000));
      try {
        await Promise.race([resume, timeout]);
        return ctx.state === "running";
      } catch (e) {
        console.warn("[avatar] audio unlock failed:", e.message || e);
        return false;
      }
    }

    function setupShowcaseAudioUnlock() {
      if (!isShowcase) return;
      const prompt = document.createElement("div");
      prompt.id = "showcase-audio-prompt";
      prompt.textContent = "Tap once to enable audio";
      document.body.appendChild(prompt);
      const unlock = async () => {
        prompt.remove();
        if (await ensureAudioUnlocked()) __audioReadyResolve();
      };
      document.addEventListener("pointerdown", unlock, { once: true });
      // If Chrome was launched with --autoplay-policy, unlock without a tap.
      void ensureAudioUnlocked().then((ok) => { if (ok) { prompt.remove(); __audioReadyResolve(); } });
    }

    try {
      const headCheck = await fetch(avatarUrl, { method: "HEAD" });
      if (!headCheck.ok) {
        throw new Error(`HTTP ${headCheck.status} for ${avatarUrl}`);
      }
    } catch (err) {
      console.error(err);
      handleFatalError(
        isProduction
          ? err
          : "Avatar GLB not found at ./avatar.glb. Drop a Ready Player Me / TalkingHead-compatible GLB (ARKit + Oculus visemes) into this folder as avatar.glb, or set window.TALKINGHEAD_AVATAR_URL in config.js."
      );
      throw err;
    }

    try {
      await head.showAvatar(
        {
          url: avatarUrl, body: "F", avatarMood: "neutral",
          // Absolution voice: FREE-tier en-US female (Standard — stays in Google's free allotment),
          // pitched DOWN server-side (Google does the semitone shift — no Pi cost) + a measured rate.
          // Pitch/rate/voice are sourced from the SHIPPING `clear` preset in voice-fx.js (single source
          // of truth); the FX chain for it is applied via voiceParams below. Keep avatarMood "neutral"
          // (its speech deltas are 0) so these pass through clean; never set animSlowdownRate (that
          // would double-shift pitch+tempo client-side). Tune via oracle-voice-audition.html.
          ttsLang: "en-US",
          ttsVoice: VOICE_PRESETS.clear.ttsVoice, ttsPitch: VOICE_PRESETS.clear.ttsPitch, ttsRate: VOICE_PRESETS.clear.ttsRate,
          lipsyncLang: "en",
          // Calm, gaze-locked hieratic idle. Head-look damped (0 idle / 0.012 speaking) so the tight close-up
          // stays centred/steady; the hieratic breath/sway in head.render keeps it alive. (matches the preview)
          avatarIdleEyeContact: 0.99, avatarIdleHeadMove: 0.0,
          avatarSpeakingEyeContact: 0.99, avatarSpeakingHeadMove: 0.012,
        },
        (ev) => {
          if (ev.lengthComputable) {
            const pct = Math.min(100, Math.round((ev.loaded / ev.total) * 100));
            showStatus(`Loading ${pct}%`);
          }
        }
      );
      hideStatus();
      setupShowcaseAudioUnlock();

      // Speech is the production contract; wire it before the cosmetic render layer.
      window.avatarSpeak = async (text) => {
        let t = String(text ?? "").trim();
        if (!t) return;
        try {
          await __audioReady;
          await ensureAudioUnlocked();
          ensureVoiceFX();
          t = cleanForSpeechClient(t);   // digits->words, St.->Saint, isolate em-dashes (promoted from the lab)
          // Pre-speech settle (breath beat) only when starting fresh — never mid-utterance (it would
          // interrupt an ongoing read-back when the absolution is appended after it).
          if (PROD_REALISM.preBreath && !head.isSpeaking) await preSpeechSettle(head, PROD_REALISM);
          speakShaped(head, t, PROD_REALISM);   // shaped visemes + viseme-coupled jaw (audio-coupled face runs continuously)
        }
        catch (err) {
          console.error("[avatar] speak failed:", err);
          if (!isProduction) showStatus(`Speak failed: ${err}`, true);
        }
      };
      if (!isProduction) { window.__head = head; }

      // ALG-15: punch-card category totals -> absolution text -> speech. This is the callable
      // seam for the sensor/orchestrator (wired in ALG-13). POSTs the totals to the same-origin
      // /absolution service (the Magisterium key lives only server-side in deploy/tts-proxy/.env),
      // then speaks the returned text. If the service is unreachable we still speak a client-side
      // canned line, so even a dead proxy never leaves a visitor with silence.
      const absolutionEndpoint = window.ABSOLUTION_ENDPOINT || "/absolution";
      const CLIENT_FALLBACK_ABSOLUTION =
        "Your declaration has been received. The harm you have named is acknowledged. No record is kept.";

      // Category id->label, fetched once, used to read the declared harms back aloud.
      let __absCats = null;
      async function absCategories() {
        if (__absCats) return __absCats;
        try { const r = await fetch(absolutionEndpoint + "/categories"); if (r.ok) __absCats = (await r.json()).categories || []; }
        catch (e) { /* read-back is best-effort */ }
        return __absCats || [];
      }
      const speakList = (a) =>
        a.length <= 1 ? a.join("") : a.length === 2 ? a[0] + " and " + a[1]
          : a.slice(0, -1).join(", ") + ", and " + a[a.length - 1];
      // Best-effort: which declared harms to read back, from punched ids / 1-based indices / labels.
      function declaredLabels(totals, cats) {
        const raw = Array.isArray(totals) ? totals
          : (totals && (totals.punched || totals.categories || totals.selections)) || [];
        const arr = Array.isArray(raw) ? raw : [];
        const ids = new Set();
        for (let t of arr) {
          if (t && typeof t === "object") t = t.id ?? t.label ?? t.name ?? t.index;
          if (t == null) continue;
          const s = String(t).trim();
          let c = null;
          if (/^\d+$/.test(s)) c = cats[parseInt(s, 10) - 1];
          else {
            const n = s.toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
            c = cats.find((x) => x.id === s || x.id.replace(/_/g, " ") === n || x.label.toLowerCase() === s.toLowerCase());
          }
          if (c) ids.add(c.id);
        }
        return cats.filter((c) => ids.has(c.id)).map((c) => c.label);
      }

      window.requestAbsolution = async (categoryTotals) => {
        // Read the declared harms back + a holding line, spoken immediately, to fill the LLM wait
        // (Magisterium can take ~25 s). speakText queues, so the response plays after this preamble.
        try {
          const labels = declaredLabels(categoryTotals, await absCategories()).map((l) => l.toLowerCase());
          const readback = labels.length
            ? "You have declared the following. " + speakList(labels) + "."
            : "You have declared no category of harm.";
          window.playOpeningGesture?.();   // varied opening gesture, synced to the read-back utterance
          window.avatarSpeak("Your card has been received and is being processed. " + readback);
        } catch (e) { /* preamble is best-effort */ }

        let text = "", source = "fallback";
        try {
          const r = await fetch(absolutionEndpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(categoryTotals || {}),
          });
          if (r.ok) {
            const d = await r.json();
            if (d && typeof d.text === "string" && d.text.trim()) { text = d.text.trim(); source = d.source || "magisterium"; }
          } else {
            console.warn("[absolution] service returned", r.status, "- using client fallback");
          }
        } catch (err) {
          console.warn("[absolution] request failed, using client fallback:", err);
        }
        if (!text) text = CLIENT_FALLBACK_ABSOLUTION;
        window.playAbsolveGesture?.();   // always close on the hand of pardon, synced to the absolution
        window.avatarSpeak(text);
        return { text, source };
      };

      // ---- Absolution voice effects (ALG-9): shared chain from voice-fx.js, spliced into
      // TalkingHead's audio graph (audio thread, off the 60fps GPU budget). Re-installed idempotently
      // because TalkingHead can rebuild its graph and does not persist reverb. Default preset is the
      // shipping "clear" voice; switch live in dev with
      // window.ORACLE_VOICE("clear"|"absolution"|"dry"|"chamber"|"transmission"|"oracle").
      const voiceParams = { ...(VOICE_PRESETS[window.ORACLE_VOICE_PRESET] || VOICE_PRESETS.clear) };
      function ensureVoiceFX() {
        const fx = installVoiceFX(head);
        if (fx && !fx.__applied) { applyVoiceParams(head, voiceParams); fx.__applied = true; }
      }
      window.ORACLE_VOICE = (name) => {
        if (!VOICE_PRESETS[name]) { console.warn("[avatar] presets:", Object.keys(VOICE_PRESETS).join(", ")); return; }
        window.ORACLE_VOICE_PRESET = name;
        Object.assign(voiceParams, VOICE_PRESETS[name]);
        if (installVoiceFX(head)) applyVoiceParams(head, voiceParams);
        applyTtsParams(head, VOICE_PRESETS[name]); // apply bundled pitch/rate/voice (clear carries them)
      };
      // Optional fine-tune from the console (e.g. window.ORACLE_VOICE_SET({ revAmt: 0.5 })).
      window.ORACLE_VOICE_SET = (patch) => { Object.assign(voiceParams, patch); applyVoiceParams(head, voiceParams); };
      ensureVoiceFX(); // install now so the default preset is live before the first utterance

      // Speech-realism layer (locked 2026-06-20). Placed BEFORE the render-layer try so it survives a
      // render-layer failure (speech + face still work). The audio-coupled facial loop runs continuously;
      // setAffect's resting baseline is applied AFTER the hieratic idle's setMood (below) so it isn't wiped.
      __facial = installAudioFacial(head, PROD_REALISM);
      // Load the dialed-in chapel impulse into the convolver (clear preset's revLen 1.5 trims it). The
      // reverb sliders/master stage still apply via applyVoiceParams; __irRaw survives graph rebuilds.
      (async () => {
        try {
          const ir = await fetch("docs/base/IR.wav");
          if (ir.ok) { await loadReverbIR(head, await ir.arrayBuffer()); applyVoiceParams(head, voiceParams); }
          else console.warn("[avatar] reverb IR missing at docs/base/IR.wav");
        } catch (e) { console.warn("[avatar] reverb IR load failed:", e); }
      })();

      // The full leveled-preview look. Isolated try/catch: a render-layer failure
      // degrades to the raw avatar with working speech rather than a black screen.
      try {

      // ===== ported render layer =====
    const scene = head.scene, camera = head.camera, renderer = head.renderer;
    renderer.toneMapping = THREE.NoToneMapping;
    scene.background = new THREE.Color(ICON.groundR, ICON.groundG, ICON.groundB);
    camera.fov = 8; camera.position.set(0,1.66,7.0); camera.updateProjectionMatrix();   // pz 7.0 (was 6.10): the gesture-tuning frame, so raised/two-hand gestures (orans, misereatur, strikeBreast) stay in view
    if (head.controls){ head.controls.target.set(0,1.66,0); head.controls.update(); }

    // Materials (unchanged icon grade)
    scene.traverse((o)=>{
      if (!o.isMesh) return;
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach((m)=>{
        if (!m) return;
        const n = (m.name||"") + "|" + (o.name||"");
        if (m.name === "OracleSkin" || (/skin|base/i.test(n) && o.name === "Human")) {
          m.roughness=0.95; m.metalness=0.0;
          if (m.color) m.color.setRGB(0.88,0.84,0.80);   // pale porcelain flesh (ref-matched)
          // Ethereal inner glow on the bare porcelain skin (tattoos removed 2026-06-19). Dialed down from 1.8 so the
          // diffuse-lit term + the dark COLOR_0 mouth read through it -> the figure glows but the mouth stays legible.
          if (m.emissive){ m.emissive.setRGB(1,1,1); m.emissiveIntensity = (window.__tatEmis||0.27); } m.needsUpdate=true;
        } else if (m.name === "IconGold") {
          m.roughness=0.85; m.metalness=0.10;
          if (m.color) m.color.setRGB(0.74,0.58,0.16);

        heartAmt:{value:LV.heartAmt}, thornAmt:{value:LV.thornAmt}, crossTop:{value:LV.crossTop},
        christoAmt:{value:LV.christoAmt}, christoScale:{value:LV.christoScale}, christoC:{value:new THREE.Vector2(LV.christoCx, LV.christoCy)},

        uniform float heartScale, heartYoff, heartAmt, thornAmt, crossTop;
        uniform vec2 headC, heartC;
        uniform float christoAmt, christoScale; uniform vec2 christoC;
        uniform float mandorlaAmt, mandorlaScale, breathe; uniform vec2 mandorlaC;
        uniform float tallyAmt, letterAmt, letterRadius;
        uniform float eyeAmt, eyeN, eyeRadius, eyeScale, blink, blinkIndex;
        uniform float atmoOn, haloAmt, haloTight, floorAmt, floorTop, floorWidth;
        uniform vec2 glowC, bgGate; uniform vec3 warmCol;
        uniform float craqGlobal;
        float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
        float vnoise(vec2 p){ vec2 i=floor(p), f=fract(p);
          float a=hash(i), b=hash(i+vec2(1.0,0.0)), c=hash(i+vec2(0.0,1.0)), d=hash(i+vec2(1.0,1.0));
          vec2 u=f*f*(3.0-2.0*f); return mix(mix(a,b,u.x), mix(c,d,u.x), u.y); }
        float fbm(vec2 p){ float s=0.0,a=0.5; for(int i=0;i<3;i++){ s+=a*vnoise(p); p*=2.0; a*=0.5; } return s; }
        vec2 worley(vec2 p){ vec2 ip=floor(p), fp=fract(p); float f1=9.0,f2=9.0;
          for(int y=-1;y<=1;y++){ for(int x=-1;x<=1;x++){ vec2 g=vec2(float(x),float(y));
            vec2 o=vec2(hash(ip+g), hash(ip+g+vec2(31.0,17.0))); vec2 r=g+o-fp; float d=dot(r,r);
            if(d<f1){ f2=f1; f1=d; } else if(d<f2){ f2=d; } }}
          return vec2(sqrt(f1), sqrt(f2)); }
        float dot2(vec2 v){ return dot(v,v); }
        // ---- emblem helpers (Chi-Rho, nimbus glyphs, vesica) ----
        float christoStroke(vec2 p, vec2 a, vec2 b, float w){

        float christoMask(vec2 q){
          float sw = 0.16;
          float strokes = 0.0;
          strokes = max(strokes, christoStroke(q, vec2(-0.7,-0.85), vec2( 0.7, 0.85), sw));
          strokes = max(strokes, christoStroke(q, vec2( 0.7,-0.85), vec2(-0.7, 0.85), sw));
          strokes = max(strokes, christoStroke(q, vec2( 0.0,-0.95), vec2( 0.0, 0.95), sw));
          vec2 lc = vec2(0.18, 0.55); float lr = 0.30;

        float sdRing(vec2 p, float R, float w){ return abs(length(p) - R) - w; }
        float sdCircle(vec2 p, float r){ return length(p)-r; }
        float sdSeg(vec2 p, vec2 a, vec2 b){ vec2 pa=p-a, ba=b-a; float h=clamp(dot(pa,ba)/dot2(ba),0.0,1.0); return length(pa-ba*h); }

          else if(id==1){

            ring = mix(ring, 1.0, gap);
            float footL = sdSeg(q, vec2(-0.42,-0.30), vec2(-0.18,-0.55)) - w;
            float footR = sdSeg(q, vec2( 0.42,-0.30), vec2( 0.18,-0.55)) - w;

          } else {
            float vL = sdSeg(q, vec2(-0.40,-0.55), vec2(-0.40,0.55)) - w;
            float vR = sdSeg(q, vec2( 0.40,-0.55), vec2( 0.40,0.55)) - w;

        void main(){
          vec3 c = texture2D(tDiffuse, vUv).rgb;

            vec2 qN = (pr - vec2(letterRadius, 0.0)) / gs;

          // radial field: bright warm burst behind the halo -> deep warm-black corners, plus a floor pool of light.

            float bgN  = 1.0 - smoothstep(bgGate.x, bgGate.y, lumA);   // 1 on dark ground, 0 on the bright figure

            float halo = exp(-dot(gp,gp)*haloTight);                   // bright core bursting behind the head
            float fy = smoothstep(floorTop, 0.0, vUv.y);               // rises toward the bottom edge
            float fx = smoothstep(floorWidth, 0.0, abs(vUv.x-0.5));    // centred pool
            float S  = clamp(halo*haloAmt + fy*fx*floorAmt + 0.06, 0.0, 1.0);
            vec3 cornerCol = vec3(0.045,0.032,0.020);                  // deep warm near-black at the edges

            c = mix(c, bgCol, bgN);

          float r = length(p) * (1.0 + (fbm(puv*3.0)-0.5)*0.10);
          float v = smoothstep(0.92, 0.30, r);
          vec3 edge = mix(vec3(0.40,0.30,0.20), vec3(1.0), v);
          c *= mix(vec3(1.0), edge, clamp(vignette,0.0,1.4));

          // ===== MANDORLA / VESICA-PISCIS reading-window (scanner aperture) =====
          {
            vec2 mp = (vUv - mandorlaC)*ar;
            float mscale = mandorlaScale * (1.0 + 0.012*breathe);
            float md = sdVesica(vec2(mp.x, mp.y/1.35)/mscale, 0.62);
            md *= mscale;
            float outline = smoothstep(0.012, 0.0, abs(md));
            float glow    = smoothstep(0.045, 0.0, abs(md)) * 0.35;

            float goldMask = smoothstep(0.42, 0.66, eyeLc);

            float rad = length(ep);
            float TAU = 6.2831853;
            float sectF = (eang/TAU + 0.5) * eyeN;
            float sIdx  = floor(sectF);
            float fa    = (fract(sectF) - 0.5) * (TAU/eyeN);
            vec2 lp = vec2(rad*fa, rad - eyeRadius);
            float isBlink = step(0.5, 1.0 - abs(sIdx - blinkIndex));
            float lid = clamp(blink,0.0,1.0) * isBlink;
            float hOpen = eyeScale * (1.0 - 0.92*lid);
            float dA = sdEyeVesica(lp, eyeScale*1.7, hOpen + 1e-4);
            float dI = length(lp / vec2(1.0, max(hOpen/(eyeScale*0.95),0.06))) - eyeScale*0.62;
            float dP = length(lp) - eyeScale*0.26;
            float aa = eyeScale*0.18 + 1e-4;
            float mOut  = smoothstep(aa, -aa, abs(dA) - eyeScale*0.13);
            float mIris = smoothstep(aa, -aa, dI);
            float mPup  = smoothstep(aa, -aa, dP);
            float lidShade = smoothstep(aa,-aa, dA) * lid;
            vec3 punch  = vec3(0.165,0.122,0.086);
            vec3 chill  = vec3(0.43,0.42,0.30);
            c = mix(c, chill, mIris * eyeAmt * 0.85 * goldMask);
            c = mix(c, punch, mPup  * eyeAmt * goldMask);
            c = mix(c, c*vec3(0.45,0.36,0.26), mOut * eyeAmt * goldMask);
            c = mix(c, mix(c, c*0.78, 0.6), lidShade * eyeAmt * goldMask);
          }

          // (body + painted glow + ground) — kept bright: cracks read as faint warm gold-leaf seams, not dark fractures.
          if (craqGlobal > 0.001) {
            vec2 wq = worley(puv*crackScale);
            float craq = 1.0 - smoothstep(0.0, 0.05, wq.y - wq.x);
            craq *= 0.5 + 0.9*fbm(puv*110.0);

        }`

    const composer = new EffectComposer(renderer);

    // half-res bloom for the ethereal halo glow; threshold ~1.0 so only the halo + rim-lit edges bloom — the

    const BLOOM = window.BLOOM = { strength:0.22, radius:0.60, threshold:1.00 };

    // ---- GODRAYS: volumetric light scattering for a holy backdrop (radial blur of the bright halo disc) ----

    const GOD = window.GOD = { on:1, exposure:0.040, decay:0.95, density:0.50, weight:0.16, gateLo:0.85 };
    const GODRAYS = {
      uniforms:{ tDiffuse:{value:null}, lightPos:{value:new THREE.Vector2(0.5,0.46)},

                 weight:{value:GOD.weight}, gateLo:{value:GOD.gateLo}, gOn:{value:1} },
      vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,

        varying vec2 vUv; uniform sampler2D tDiffuse; uniform vec2 lightPos;
        uniform float exposure, decay, density, weight, gateLo, gOn;
        const int SAMPLES=48;
        void main(){
          vec4 base = texture2D(tDiffuse, vUv);
          if(gOn < 0.5){ gl_FragColor = base; return; }
          vec2 tc = vUv;
          vec2 dt = (vUv - lightPos) * (density / float(SAMPLES));
          float decayf = 1.0; vec3 accum = vec3(0.0);
          for(int i=0;i<SAMPLES;i++){
            tc -= dt;
            vec3 s = texture2D(tDiffuse, tc).rgb;
            float lum = dot(s, vec3(0.299,0.587,0.114));
            s *= smoothstep(gateLo, gateLo+0.30, lum);   // only bright pixels (heart core, halo, glowing tattoos) throw shafts

      "RightHandRing1.rotation":{x:0.06,y:0,z:0}, "RightHandPinky1.rotation":{x:0.08,y:0,z:0},
      "RightHandThumb1.rotation":{x:0.2,y:-0.2,z:-0.3},
      "LeftShoulder.rotation":{x:1.758,y:-0.099,z:-1.604}, "LeftArm.rotation":{x:1.35,y:0.20,z:0.55},
      "LeftForeArm.rotation":{x:0.0,y:-0.15,z:0.75}, "LeftHand.rotation":{x:0.45,y:0.20,z:0.05},
      "LeftHandIndex1.rotation":{x:0.05,y:0,z:0}, "LeftHandMiddle1.rotation":{x:0.05,y:0,z:0},
      "LeftHandRing1.rotation":{x:0.06,y:0,z:0}, "LeftHandPinky1.rotation":{x:0.08,y:0,z:0},
      "LeftHandThumb1.rotation":{x:0.2,y:0.2,z:0.3},
    };
    const _signFingersOpen = {
      "RightHandIndex1.rotation":{x:-0.05,y:0,z:0}, "RightHandMiddle1.rotation":{x:-0.05,y:0.04,z:0},
      "RightHandRing1.rotation":{x:-0.05,y:0,z:0}, "RightHandPinky1.rotation":{x:-0.05,y:0,z:0},
      "RightHandThumb1.rotation":{x:0.1,y:-0.25,z:-0.4},
    };
    head.gestureTemplates["signFore"] = Object.assign({
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:0.85,y:-0.35,z:-1.00},
      "RightForeArm.rotation":{x:0.0,y:0.30,z:-2.05}, "RightHand.rotation":{x:-0.30,y:-0.55,z:-0.20},
    }, _signFingersOpen);
    head.gestureTemplates["signChest"] = Object.assign({
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:1.20,y:-0.25,z:-0.70},
      "RightForeArm.rotation":{x:0.0,y:0.20,z:-1.30}, "RightHand.rotation":{x:-0.20,y:-0.30,z:-0.05},
    }, _signFingersOpen);
    head.gestureTemplates["signLeftSh"] = Object.assign({
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:1.05,y:0.10,z:-0.35},
      "RightForeArm.rotation":{x:0.0,y:0.10,z:-1.55}, "RightHand.rotation":{x:-0.20,y:-0.20,z:0.0},
    }, _signFingersOpen);
    head.gestureTemplates["signRightSh"] = Object.assign({
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:1.05,y:-0.55,z:-1.05},
      "RightForeArm.rotation":{x:0.0,y:0.35,z:-1.20}, "RightHand.rotation":{x:-0.20,y:-0.45,z:-0.15},
    }, _signFingersOpen);
    function playSignOfCross(){
      head.playGesture("signFore", 1.5, false, 900);
      setTimeout(()=> head.playGesture("signChest",   1.5, false, 700), 1200);
      setTimeout(()=> head.playGesture("signLeftSh",  1.5, false, 700), 2400);
      setTimeout(()=> head.playGesture("signRightSh", 1.5, false, 700), 3600);
    }

    // ---- Confiteor breast-strike + joined-hands intercession (tuned in oracle-leveled-preview.html) ----
    // strikeBreast is the contact (fist on the sternum + head bow); strikeBreastLift is the pull-off between
    // taps. playStrikeBreast chains them into the "mea culpa, mea culpa, mea maxima culpa" triple-tap.
    head.gestureTemplates["strikeBreast"] = {
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:0.82,y:-0.02,z:-0.94},
      "RightForeArm.rotation":{x:1.52,y:-0.98,z:-1.50}, "RightHand.rotation":{x:0.22,y:-0.56,z:-0.10},
      "RightHandIndex1.rotation":{x:1.2,y:0,z:0}, "RightHandIndex2.rotation":{x:1.4,y:0,z:0},
      "RightHandMiddle1.rotation":{x:1.2,y:0,z:0}, "RightHandMiddle2.rotation":{x:1.4,y:0,z:0},
      "RightHandRing1.rotation":{x:1.5,y:0,z:0}, "RightHandRing2.rotation":{x:1.4,y:0,z:0},
      "RightHandPinky1.rotation":{x:1.6,y:0,z:0}, "RightHandPinky2.rotation":{x:1.3,y:0,z:0},
      "RightHandThumb1.rotation":{x:0.6,y:-0.2,z:-0.6}, "RightHandThumb2.rotation":{x:0.2,y:0.04,z:0.6},
      "Neck.rotation":{x:0.16,y:0,z:0}, "Head.rotation":{x:0.16,y:0,z:0},
    };
    head.gestureTemplates["strikeBreastLift"] = {
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:0.82,y:0.18,z:-0.86},
      "RightForeArm.rotation":{x:1.52,y:-0.68,z:-1.42}, "RightHand.rotation":{x:-0.12,y:-0.28,z:0.04},
      "RightHandIndex1.rotation":{x:1.2,y:0,z:0}, "RightHandIndex2.rotation":{x:1.4,y:0,z:0},
      "RightHandMiddle1.rotation":{x:1.2,y:0,z:0}, "RightHandMiddle2.rotation":{x:1.4,y:0,z:0},
      "RightHandRing1.rotation":{x:1.5,y:0,z:0}, "RightHandRing2.rotation":{x:1.4,y:0,z:0},
      "RightHandPinky1.rotation":{x:1.6,y:0,z:0}, "RightHandPinky2.rotation":{x:1.3,y:0,z:0},
      "RightHandThumb1.rotation":{x:0.6,y:-0.2,z:-0.6}, "RightHandThumb2.rotation":{x:0.2,y:0.04,z:0.6},
      "Neck.rotation":{x:0.14,y:0,z:0}, "Head.rotation":{x:0.14,y:0,z:0},
    };
    function playStrikeBreast(){            // "mea culpa, mea culpa, mea maxima culpa" — three percussive taps
      head.playGesture("strikeBreast",     4, false, 450);
      setTimeout(()=> head.playGesture("strikeBreastLift", 1, false, 180),  650);
      setTimeout(()=> head.playGesture("strikeBreast",     1, false, 160),  880);
      setTimeout(()=> head.playGesture("strikeBreastLift", 1, false, 180), 1120);
      setTimeout(()=> head.playGesture("strikeBreast",     4, false, 160), 1360);
    }
    // misereatur — joined palm-to-palm prayer hands on the centerline (pre-absolution intercession)
    head.gestureTemplates["misereatur"] = {
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:0.90,y:-0.22,z:-1.20},
      "RightForeArm.rotation":{x:-0.08,y:0.64,z:-2.10}, "RightHand.rotation":{x:-0.18,y:0.84,z:-0.28},
      "RightHandIndex1.rotation":{x:0.0,y:0,z:0}, "RightHandMiddle1.rotation":{x:0.0,y:0,z:0},
      "RightHandRing1.rotation":{x:0.0,y:0,z:0}, "RightHandPinky1.rotation":{x:0.0,y:0,z:0},
      "RightHandThumb1.rotation":{x:0.1,y:-0.2,z:-0.3},
      "LeftShoulder.rotation":{x:1.758,y:-0.099,z:-1.604}, "LeftArm.rotation":{x:0.90,y:0.22,z:1.20},
      "LeftForeArm.rotation":{x:-0.08,y:-0.64,z:2.10}, "LeftHand.rotation":{x:-0.18,y:-0.84,z:0.28},
      "LeftHandIndex1.rotation":{x:0.0,y:0,z:0}, "LeftHandMiddle1.rotation":{x:0.0,y:0,z:0},
      "LeftHandRing1.rotation":{x:0.0,y:0,z:0}, "LeftHandPinky1.rotation":{x:0.0,y:0,z:0},
      "LeftHandThumb1.rotation":{x:0.1,y:0.2,z:0.3},
      "Neck.rotation":{x:0.12,y:0,z:0}, "Head.rotation":{x:0.30,y:0,z:0},
    };
    /* ===================== SACRED HEART — baked into the avatar GLB (rides the Spine2 joint) ===================== */
    (function(){
      // The heart is now a node inside the avatar GLB, parented to the Spine2 bone and seated in a chest
      // socket — so it follows every pose/gesture/breath through the rig (no per-frame repositioning needed).
      // This block only (a) pins the framing and (b) drives the furnace glow / heartbeat off the painted texture.
      applyPortraitFraming();
      if (head.controls) head.controls.enabled = false;
      const EMIS = window.__heartEmis = { base:1.0, beat:1.0, flick:0.12 };
      const mats = window.__heartMats = [];   // baked-heart materials we drive for the heartbeat glow

      function wireHeartGlow(){
        const heart = scene.getObjectByName("SacredHeart");
        if(!heart) return false;
        window.__heart = heart;
        heart.traverse(o=>{ if(o.isMesh && o.material){
          const arr = Array.isArray(o.material) ? o.material : [o.material];
          arr.forEach(m=>{ m.emissive = new THREE.Color(1,1,1); m.emissiveMap = m.map || null;  // glow follows the painted gold/flame
                           m.emissiveIntensity = EMIS.base; m.needsUpdate = true; mats.push(m); });
        }});
        return true;
      }
      // the avatar mesh tree may not be attached the instant showAvatar resolves — retry briefly
      let tries = 0; (function waitForHeart(){ if(wireHeartGlow() || tries++ > 180) return; requestAnimationFrame(waitForHeart); })();

      function beatLoop(){
        const t=performance.now()*0.001, ph=(t*(LV.bpm/60.0))%1.0;
        const s1=Math.pow(Math.max(0,Math.sin(ph*Math.PI*2)),8.0);
        const s2=0.6*Math.pow(Math.max(0,Math.sin((ph-0.16)*Math.PI*2)),8.0);
        const beat=Math.min(1.0,(s1+(ph<0.34?s2:0)))*LV.beatDepth;
        const ei=EMIS.base*(0.85+EMIS.beat*beat)*(1.0+EMIS.flick*Math.sin(t*8.0));
        for(let i=0;i<mats.length;i++) mats[i].emissiveIntensity=ei;
        bloomPass.strength=BLOOM.strength; bloomPass.radius=BLOOM.radius; bloomPass.threshold=BLOOM.threshold;
        requestAnimationFrame(beatLoop);
      }
      beatLoop();
    })();
    /* =================== end Sacred Heart =================== */

    /* ===================== AUTO-CAMERA + LIGHTING SWELL (ported from the gesture-tuning preview) =====================
       Resting frame = a tight, centred face. When a gesture fires the camera eases OUT to a medium frame that holds
       the whole gesture (head + halo + chest) and the god-rays + glow SWELL; on return it eases back to the face. */
    (function(){
      const CAMRIG = window.CAMRIG = {
        on: true,
        face: { px:0, py:1.74, pz:1.72, tx:0, ty:1.74, tz:0, fov:10 },  // resting: tight, centred face (neck cropped)
        wide: { px:0, py:1.62, pz:3.8,  tx:0, ty:1.60, tz:0, fov:15 },  // gesture: head + halo + chest, cropped ~navel
        outMs: 3200, inMs: 3600, hold: 350,   // slow cinematic zoom; outMs 2400->3200 (close->wide) + inMs 3000->3600 (wide->close) for gentler, smoother eases both ways
      };
      const LIGHTSWELL = window.LIGHTSWELL = {
        on: true,
        close: { godExp:0.040, godWt:0.16, godGate:0.85, emis:0.27, bloomS:0.22 },  // = the baked GOD/BLOOM/emissive defaults
        swell: { godExp:0.080, godWt:0.23, godGate:0.72, emis:0.30, bloomS:0.26 },  // more god-ray when wide; skin emission only a touch above close (0.27)
      };
      const lerp = (a,b,t)=> a+(b-a)*t;
      const ease = (t)=> t*t*t*(t*(t*6-15)+10);   // smootherstep (quintic): zero velocity AND accel at both ends — extra-smooth
      const setEmis = (v)=> scene.traverse(o=>{ if(o.isMesh&&o.material){ (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{ if(m&&m.name==="OracleSkin"){ m.emissiveIntensity=v; m.needsUpdate=true; } }); } });
      const getEmis = ()=>{ let v=LIGHTSWELL.close.emis; scene.traverse(o=>{ if(o.isMesh&&o.material){ (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{ if(m&&m.name==="OracleSkin") v=m.emissiveIntensity; }); } }); return v; };
      let camRAF=null, lightRAF=null;
      function tweenCam(to, ms){
        if(camRAF) cancelAnimationFrame(camRAF);
        const c=window.__cam, from={px:c.px,py:c.py,pz:c.pz,tx:c.tx,ty:c.ty,tz:c.tz,fov:camera.fov}, t0=performance.now();
        (function step(){
          const k=Math.min(1,(performance.now()-t0)/ms), e=ease(k);
          c.px=lerp(from.px,to.px,e); c.py=lerp(from.py,to.py,e); c.pz=lerp(from.pz,to.pz,e);
          c.tx=lerp(from.tx,to.tx,e); c.ty=lerp(from.ty,to.ty,e); c.tz=lerp(from.tz,to.tz,e);
          if(to.fov!=null){ camera.fov=lerp(from.fov,to.fov,e); camera.updateProjectionMatrix(); }
          camRAF = k<1 ? requestAnimationFrame(step) : null;
        })();
      }
      function tweenLight(to, ms){
        if(lightRAF) cancelAnimationFrame(lightRAF);
        const from={godExp:GOD.exposure,godWt:GOD.weight,godGate:GOD.gateLo,emis:getEmis(),bloomS:BLOOM.strength}, t0=performance.now();
        (function step(){
          const k=Math.min(1,(performance.now()-t0)/ms), e=ease(k);
          GOD.exposure=lerp(from.godExp,to.godExp,e); GOD.weight=lerp(from.godWt,to.godWt,e); GOD.gateLo=lerp(from.godGate,to.godGate,e);
          BLOOM.strength=lerp(from.bloomS,to.bloomS,e); setEmis(lerp(from.emis,to.emis,e));
          lightRAF = k<1 ? requestAnimationFrame(step) : null;
        })();
      }
      window.__tweenCam=tweenCam; window.__tweenLight=tweenLight;

      // resting frame = FACE (overrides applyPortraitFraming / the heart block's __cam)
      window.__cam = { px:CAMRIG.face.px, py:CAMRIG.face.py, pz:CAMRIG.face.pz, tx:CAMRIG.face.tx, ty:CAMRIG.face.ty, tz:CAMRIG.face.tz };
      camera.fov = CAMRIG.face.fov; window.__restFov = CAMRIG.face.fov; camera.updateProjectionMatrix();

      let returnTimer=null, isWide=false;
      function gestureCamera(durSec){
        durSec=(typeof durSec==="number"&&durSec>0)?durSec:4;
        if(!isWide){ isWide=true; tweenCam(CAMRIG.wide, CAMRIG.outMs); if(LIGHTSWELL.on) tweenLight(LIGHTSWELL.swell, CAMRIG.outMs); }
        if(returnTimer) clearTimeout(returnTimer);
        returnTimer=setTimeout(()=>{ isWide=false; tweenCam(CAMRIG.face, CAMRIG.inMs); if(LIGHTSWELL.on) tweenLight(LIGHTSWELL.close, CAMRIG.inMs); returnTimer=null; }, durSec*1000 + CAMRIG.hold);
      }
      window.__gestureCamera=gestureCamera;

      // hook playGesture: ease out on a real gesture; skip the rapid sub-taps / tuner micro-holds (transition <200ms)
      const _play = head.playGesture.bind(head);
      head.playGesture = function(name, dur, mirror, transMs){
        if(CAMRIG.on && (transMs==null || transMs>=200)) gestureCamera(dur);
        return _play(name, dur, mirror, transMs);
      };
    })();
    /* =================== end AUTO-CAMERA + LIGHTING SWELL =================== */

      } catch (gradeErr) {
        console.error("[avatar] render layer failed; rendering raw avatar:", gradeErr);
      }
    } catch (err) {
      console.error(err);
      handleFatalError(isProduction ? err : `Failed to load avatar: ${err}`);
    }

    if (!isProduction) {
      // Dev harm-picker (ALG-14): fetch the canonical categories, render checkboxes, and on send
      // POST the punched ids through window.requestAbsolution -> /absolution -> avatar + LLM.
      const harmList = document.getElementById("harm-list");
      const harmSend = document.getElementById("harm-send");
      const harmClear = document.getElementById("harm-clear");
      const absBase = window.ABSOLUTION_ENDPOINT || "/absolution";
      fetch(absBase + "/categories")
        .then((r) => (r.ok ? r.json() : Promise.reject("HTTP " + r.status)))
        .then((d) => {
          for (const c of (d && d.categories) || []) {
            const label = document.createElement("label");
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.value = c.id;
            label.append(cb, document.createTextNode(" " + c.label));
            harmList.append(label);
          }
          harmSend.disabled = false;
        })
        .catch((e) => console.warn("[harm-picker] could not load categories:", e));
      harmClear.addEventListener("click", () => {
        harmList.querySelectorAll("input:checked").forEach((i) => { i.checked = false; });
      });
      harmSend.addEventListener("click", async () => {
        if (typeof window.requestAbsolution !== "function") { console.warn("[avatar] not ready yet"); return; }
        const punched = [...harmList.querySelectorAll("input:checked")].map((i) => i.value);
        harmSend.disabled = true;
        try {
          await window.requestAbsolution({ punched }); // avatar speaks the read-back + response; no on-screen text
        } catch (err) {
          console.warn("[absolution] request failed:", err);
        } finally {
          harmSend.disabled = false;
        }
      });
    }

    // ===== SHOWCASE BRIDGE — Denver two-screen demo (2026-06). REMOVE FOR FINAL INSTALL. =====
    // A standalone punch card (showcase/form-1517a.html) runs in a separate window and posts the
    // punched card here over a same-origin BroadcastChannel. We forward it to the SAME
    // window.requestAbsolution() the real card reader will call (so this changes nothing about the
    // production contract). Gated behind ?showcase, so it is inert in the real install. To remove
    // the showcase entirely: delete this block and the showcase/ folder.
    if (new URLSearchParams(location.search).has("showcase") && "BroadcastChannel" in window) {
      const showcaseChannel = new BroadcastChannel("absolution");
      showcaseChannel.onmessage = (ev) => {
        const d = ev.data || {};
        if (d.type !== "submit") return;
        showcaseChannel.postMessage({ type: "ack", ts: d.ts }); // tell the card it was received
        if (typeof window.requestAbsolution === "function") {
          window.requestAbsolution({ punched: Array.isArray(d.punched) ? d.punched : [] });
        } else {
          console.warn("[showcase] requestAbsolution not ready yet");
        }
      };
      console.log("[showcase] bridge listening on BroadcastChannel('absolution')");
    }
    // ===== END SHOWCASE BRIDGE =====

    // Two-window showcase: don't suspend audio when the form window steals focus.
    document.addEventListener("visibilitychange", () => {
      if (isShowcase) return;
      if (document.visibilityState === "visible") head.start();
      else head.stop();
    });
  </script>
