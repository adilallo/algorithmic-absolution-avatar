<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TalkingHead</title>
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    background: #202020;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }
  body.production {
    max-width: none;
    margin: 0;
    cursor: none;
  }
  body.production #controls {
    display: none;
  }
  #avatar {
    flex: 1;
    width: 100%;
    min-height: 0;
  }
  #controls {
    display: flex;
    gap: 8px;
    padding: 12px;
    background: #181818;
    border-top: 1px solid #2a2a2a;
  }
  #text {
    flex: 1;
    padding: 10px 12px;
    font-size: 16px;
    border: 1px solid #333;
    border-radius: 6px;
    background: #111;
    color: #fff;
  }
  #speak {
    padding: 10px 18px;
    font-size: 16px;
    border: 0;
    border-radius: 6px;
    background: #2f7cff;
    color: #fff;
    cursor: pointer;
  }
  #speak:disabled {
    background: #444;
    cursor: not-allowed;
  }
  #status {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.55);
    border-radius: 6px;
    font-size: 14px;
    pointer-events: none;
  }
  #status.hidden { display: none; }
  #status.error { background: rgba(140, 30, 30, 0.85); }
</style>
</head>
<body>
  <div id="avatar"></div>
  <div id="status">Loading...</div>
  <div id="controls">
    <input id="text" type="text" placeholder="Type something for the avatar to say..." value="Hello! I am a talking head." />
    <button id="speak" disabled>Speak</button>
  </div>

  <script src="./config.js" onerror="window.__TH_NO_CONFIG = true"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
    }
  }
  </script>

  <script type="module">
    import { TalkingHead } from "talkinghead";
    import * as THREE from "three";
    import { EffectComposer }  from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass }      from "three/addons/postprocessing/RenderPass.js";
    import { ShaderPass }      from "three/addons/postprocessing/ShaderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
    import { OutputPass }      from "three/addons/postprocessing/OutputPass.js";

    const isProduction =
      window.TALKINGHEAD_PRODUCTION === true ||
      new URLSearchParams(location.search).has("production");

    if (isProduction) {
      document.body.classList.add("production");
    }

    const statusEl = document.getElementById("status");
    const speakBtn = document.getElementById("speak");
    const textEl = document.getElementById("text");
    const avatarEl = document.getElementById("avatar");

    function showStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
      statusEl.classList.toggle("error", isError);
    }
    function hideStatus() {
      statusEl.classList.add("hidden");
    }

    function scheduleRecovery(reason) {
      console.error("[avatar] fatal error, reloading in 3s:", reason);
      setTimeout(() => location.reload(), 3000);
    }

    function handleFatalError(reason) {
      if (isProduction) {
        scheduleRecovery(reason);
      } else {
        showStatus(String(reason), true);
      }
    }

    if (isProduction) {
      document.addEventListener("contextmenu", (ev) => ev.preventDefault());
      document.addEventListener("keydown", (ev) => {
        const key = ev.key;
        if (
          key === "F5" ||
          key === "F11" ||
          key === "F12" ||
          (ev.ctrlKey && (key === "r" || key === "R")) ||
          (ev.ctrlKey && ev.shiftKey && (key === "i" || key === "I" || key === "j" || key === "J")) ||
          (ev.metaKey && (key === "r" || key === "R")) ||
          (ev.metaKey && ev.altKey && (key === "i" || key === "I"))
        ) {
          ev.preventDefault();
        }
      });
    }

    const apiKey = window.TALKINGHEAD_TTS_APIKEY;
    if (window.__TH_NO_CONFIG || !apiKey || apiKey === "your-key-here") {
      handleFatalError(
        "Missing config.js. Copy config.example.js to config.js and set your Google TTS API key."
      );
      throw new Error("TalkingHead: missing TTS API key");
    }

    // CRT-oracle render-layer tunables (ported from oracle-preview.html, baked to the
    // values the artist signed off on). Exposed on window for live tuning in the console;
    // e.g. `ORACLE.mono = 0; ORACLE.bloom = 0` shows the raw, ungraded avatar.
    const ORACLE = window.ORACLE = {
      tintR: 0.55, tintG: 0.78, tintB: 1.18,   // blue phosphor tint
      mono: 0.92,                              // 0=full color … 1=full monochrome
      scanIntensity: 0.18, scanCount: 900.0,   // CRT scanlines
      vignette: 1.7,                           // edge darkening
      grain: 0.07,                             // film grain
      bloom: 0.55, bloomRadius: 0.5, bloomThresh: 0.72,
      rimIntensity: 22.0,                      // backlit halo strength
    };

    const head = new TalkingHead(avatarEl, {
      ttsEndpoint: "https://eu-texttospeech.googleapis.com/v1beta1/text:synthesize",
      ttsApikey: apiKey,
      lipsyncModules: ["en"],
      // Head-and-shoulders portrait framing + dim cool oracle lighting (matches oracle-preview.html).
      cameraView: "head",
      lightAmbientColor: 0x4a5d82, lightAmbientIntensity: 0.20,
      lightDirectColor: 0x88a6da, lightDirectIntensity: 1.4,
      lightDirectPhi: 1.0, lightDirectTheta: 1.4,
      lightSpotIntensity: 0,
    });

    // --- CRT oracle render-layer ---------------------------------------------
    // Ported from oracle-preview.html: dark void + backlit halo rim light,
    // telephoto head-and-shoulders framing, and an EffectComposer grade
    // (bloom → blue monochrome + scanlines + vignette + grain). Base-independent;
    // the Pi-5 half-res-bloom optimization is preserved. Call once after showAvatar.
    function setupOracleRenderLayer() {
      const scene = head.scene, camera = head.camera, renderer = head.renderer;
      scene.background = new THREE.Color(0x05080e);

      const headBone = head.armature?.getObjectByName("Head");
      const rim = new THREE.SpotLight(0xbcd4ff, ORACLE.rimIntensity, 0, Math.PI / 5, 0.6, 1.2);
      rim.position.set(0.0, 1.85, -0.9);               // behind & above the head
      if (headBone) { rim.target = headBone; }
      else { rim.target.position.set(0, 1.6, 0); scene.add(rim.target); }
      scene.add(rim);

      // Head-and-shoulders portrait framing (telephoto; tuned for the MPFB oracle base).
      camera.fov = 10;
      camera.position.set(0, 1.60, 2.95);
      camera.updateProjectionMatrix();
      if (head.controls) { head.controls.target.set(0, 1.55, 0); head.controls.update(); }

      // CRT grade shader (mono+tint, scanlines, vignette, grain).
      const CRT = {
        uniforms: {
          tDiffuse: { value: null }, time: { value: 0 }, res: { value: new THREE.Vector2(1, 1) },
          tint: { value: new THREE.Color(ORACLE.tintR, ORACLE.tintG, ORACLE.tintB) },
          mono: { value: ORACLE.mono }, scanI: { value: ORACLE.scanIntensity }, scanN: { value: ORACLE.scanCount },
          vig: { value: ORACLE.vignette }, grain: { value: ORACLE.grain },
        },
        vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
        fragmentShader: `
          varying vec2 vUv; uniform sampler2D tDiffuse; uniform float time; uniform vec2 res;
          uniform vec3 tint; uniform float mono, scanI, scanN, vig, grain;
          float hash(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
          void main(){
            vec3 c = texture2D(tDiffuse, vUv).rgb;
            float l = dot(c, vec3(0.299,0.587,0.114));
            vec3 graded = l * tint;                 // monochrome blue phosphor
            c = mix(c, graded, mono);
            float scan = mix(1.0, 0.5+0.5*sin(vUv.y*scanN), scanI);  // scanlines
            c *= scan;
            vec2 d = vUv-0.5; float v = 1.0 - dot(d,d)*vig; c *= clamp(v,0.0,1.0); // vignette
            c += (hash(vUv*res + time)-0.5)*grain;  // grain
            gl_FragColor = vec4(c, 1.0);
          }`
      };

      // Composer: RenderPass → UnrealBloomPass → OutputPass → CRT grade.
      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloom = new UnrealBloomPass(new THREE.Vector2(1, 1), ORACLE.bloom, ORACLE.bloomRadius, ORACLE.bloomThresh);
      composer.addPass(bloom);
      composer.addPass(new OutputPass());
      const crtPass = new ShaderPass(CRT);
      composer.addPass(crtPass);

      function sizeAll() {
        const w = avatarEl.clientWidth, h = avatarEl.clientHeight;
        composer.setSize(w, h);
        // Half-res bloom: ~4x cheaper fragment cost (the dominant post pass on the Pi 5).
        // The halo is soft, so the lower-res bloom is visually indistinguishable.
        bloom.setSize(Math.max(1, w >> 1), Math.max(1, h >> 1));
        crtPass.uniforms.res.value.set(w, h);
      }
      sizeAll();
      window.addEventListener("resize", sizeAll);

      // Drive the composer from TalkingHead's own render loop.
      head.render = function () {
        if (!this.isRunning || this.isAvatarOnly) return;
        const u = crtPass.uniforms;
        u.time.value = performance.now() / 1000;
        u.tint.value.setRGB(ORACLE.tintR, ORACLE.tintG, ORACLE.tintB);
        u.mono.value = ORACLE.mono; u.scanI.value = ORACLE.scanIntensity; u.scanN.value = ORACLE.scanCount;
        u.vig.value = ORACLE.vignette; u.grain.value = ORACLE.grain;
        bloom.strength = ORACLE.bloom; bloom.radius = ORACLE.bloomRadius; bloom.threshold = ORACLE.bloomThresh;
        rim.intensity = ORACLE.rimIntensity;
        composer.render();
      };
    }

    const avatarUrl = window.TALKINGHEAD_AVATAR_URL || "./avatar.glb";

    try {
      const headCheck = await fetch(avatarUrl, { method: "HEAD" });
      if (!headCheck.ok) {
        throw new Error(`HTTP ${headCheck.status} for ${avatarUrl}`);
      }
    } catch (err) {
      console.error(err);
      handleFatalError(
        isProduction
          ? err
          : "Avatar GLB not found at ./avatar.glb. Drop a Ready Player Me / TalkingHead-compatible GLB (ARKit + Oculus visemes) into this folder as avatar.glb, or set window.TALKINGHEAD_AVATAR_URL in config.js."
      );
      throw err;
    }

    try {
      await head.showAvatar(
        {
          url: avatarUrl,
          body: "F",
          avatarMood: "neutral",
          ttsLang: "en-GB",
          ttsVoice: "en-GB-Standard-A",
          lipsyncLang: "en",
          // Calm, gaze-locked oracle: hold eye contact, minimal idle/speaking head drift.
          avatarIdleEyeContact: 0.85,
          avatarIdleHeadMove: 0.2,
          avatarSpeakingEyeContact: 0.9,
          avatarSpeakingHeadMove: 0.3,
        },
        (ev) => {
          if (ev.lengthComputable) {
            const pct = Math.min(100, Math.round((ev.loaded / ev.total) * 100));
            showStatus(`Loading ${pct}%`);
          }
        }
      );
      hideStatus();

      // Functional wiring first: speech is the production integration contract and must
      // not depend on the cosmetic CRT grade initializing successfully.
      window.avatarSpeak = (text) => {
        const t = String(text ?? "").trim();
        if (!t) return;
        try {
          head.speakText(t);
        } catch (err) {
          console.error("[avatar] speak failed:", err);
          if (!isProduction) {
            showStatus(`Speak failed: ${err}`, true);
          }
        }
      };
      if (!isProduction) {
        speakBtn.disabled = false;
        window.__head = head;
      }

      // Apply the CRT oracle grade in both production and dev — dev mode just adds the
      // Speak controls on top, so you preview the real shipped look. To inspect the raw
      // avatar, use oracle-preview.html or set ORACLE.mono = 0; ORACLE.bloom = 0.
      // Isolated in its own try/catch: a render-layer failure degrades to the raw avatar
      // with working speech rather than taking down avatarSpeak / the whole load.
      try {
        setupOracleRenderLayer();
      } catch (gradeErr) {
        console.error("[avatar] CRT grade failed to initialize; rendering raw avatar:", gradeErr);
      }
    } catch (err) {
      console.error(err);
      handleFatalError(isProduction ? err : `Failed to load avatar: ${err}`);
    }

    if (!isProduction) {
      function speakNow() {
        const text = textEl.value.trim();
        if (!text) return;
        window.avatarSpeak(text);
      }

      speakBtn.addEventListener("click", speakNow);
      textEl.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") {
          ev.preventDefault();
          speakNow();
        }
      });
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") head.start();
      else head.stop();
    });
  </script>
</body>
</html>
