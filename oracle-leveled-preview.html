<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oracle · leveled</title>
<style>
  html, body { width:100%; height:100%; margin:0; background:#000; overflow:hidden; }
  #avatar { position:fixed; inset:0; width:100%; height:100%; }
  #hud { position:fixed; left:10px; bottom:10px; z-index:10;
    font:12px ui-monospace, Menlo, monospace; color:#d8c08a;
    background:rgba(0,0,0,.45); padding:6px 8px; border-radius:6px; pointer-events:none; white-space:pre; }
  #ctl { position:fixed; right:10px; bottom:10px; z-index:10; display:flex; flex-wrap:wrap; justify-content:flex-end; max-width:80vw; gap:6px; }
  #ctl button { font:12px ui-monospace, Menlo, monospace; color:#1a120a; background:#d8c08a; border:0; padding:8px 12px; border-radius:6px; cursor:pointer; }
  #ctl button:disabled { opacity:.5; }
  #tune { position:fixed; right:10px; top:10px; z-index:20; width:300px; max-height:90vh; overflow:auto;
    font:11px ui-monospace, Menlo, monospace; color:#e8d6a0; background:rgba(0,0,0,.66);
    padding:8px; border-radius:8px; border:1px solid rgba(216,192,138,.25); }
  #tune .tune-row { display:flex; align-items:center; gap:6px; margin:3px 0; }
  #tune .tune-head { margin-bottom:6px; }
  #tune select, #tune button { font:11px ui-monospace,Menlo,monospace; color:#1a120a; background:#d8c08a; border:0; border-radius:5px; padding:4px 6px; cursor:pointer; }
  #tune label { display:flex; align-items:center; gap:3px; color:#c8b888; }
  #tune .tune-lab { width:120px; flex:0 0 auto; color:#c8b888; }
  #tune .tune-num { width:40px; text-align:right; flex:0 0 auto; }
  #tune input[type=range] { flex:1 1 auto; min-width:50px; accent-color:#d8c08a; }
</style>
</head>
<body>
  <div id="avatar"></div>
  <div id="hud">oracle · leveled · loading…</div>
  <div id="ctl">
    <button id="bless">✛ bless</button>
    <button id="latin">✛ latin</button>
    <button id="heartg">♥ present</button>
    <button id="absolveb">⊹ absolve</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
    }
  }
  </script>

  <script type="module">
    import { TalkingHead } from "talkinghead";
    import * as THREE from "three";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass }    from "three/addons/postprocessing/RenderPass.js";
    import { ShaderPass }    from "three/addons/postprocessing/ShaderPass.js";
    import { OutputPass }    from "three/addons/postprocessing/OutputPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
    import { GLTFLoader }    from "three/addons/loaders/GLTFLoader.js";

    const hud = document.getElementById("hud");
    const avatarEl = document.getElementById("avatar");
    const TAU = Math.PI*2, fract = x => x - Math.floor(x);

    const ICON = window.ICON = {
      // pale-porcelain + gold-leaf direction (ref-matched): gold-push pulled back so the flesh stays pale.
      // crackle/tooth pulled WAY down so the body reads as smooth porcelain and the dark ground stays clean
      // (the old high crack values mosaic'd the flat background); vignette/ground darkened for the deep-corner falloff.
      crackStrength:0.06, crackScale:58.0, toothAmount:0.02, terreVerte:0.05,
      duoAmount:0.10, desat:0.92, vignette:1.05, exposure:0.84,
      groundR:0.05, groundG:0.04, groundB:0.028,
      craqGlobal:0.0,   // icon overlay texture REMOVED (was a whole-frame craquelure); body crackle back to smooth porcelain
    };

    // Warm "sanctuary" atmosphere: a radial glow bursting behind the halo + a floor pool of light, with the
    // figure masked out by luminance so the glow fills the dark ground (and corners) without blowing out the body.
    const ATMO = window.ATMO = {
      on:1, glowCx:0.50, glowCy:0.84, haloAmt:0.85, haloTight:5.0,
      floorAmt:0.90, floorTop:0.32, floorWidth:0.60,
      warmR:1.0, warmG:0.84, warmB:0.52,
      bgLo:0.30, bgHi:0.55,
    };

    // Leveled (representational) layer knobs — combine/refine these live
    const LV = window.LV = {
      on:1,
      // gold-field grade effects zeroed for the pale full-body figure (clean ground like the reference);
      // kept as knobs so the bureaucratic gold-field can be dialed back if framing returns to a bust.
      ledgerAmt:0.0, ledgerRows:36.0, ledgerCols:26.0,    // gold-field as ruled indulgence form
      rayAmt:0.0, rayN:46.0, rayFall:0.46,                 // analytic glory sunburst behind head
      crossAmt:0.0,                                        // cruciform nimbus bars
      headCx:0.55, headCy:0.57,                            // note: vUv.y is 0 at bottom, 1 at top
      heartCx:0.50, heartCy:0.25, heartScale:0.092, heartYoff:0.62,  // Sacred Heart on the sternum
      heartAmt:0.85, thornAmt:0.35, crossTop:0.40,
      bpm:62.0, beatDepth:1.0,                             // lub-dub
      // discrete emblems MOVED from the gold field onto the body as gold-leaf tattoos (baked into OracleSkin).
      // amounts zeroed here; geometry/uniforms kept so they can be dialed back into the field if wanted.
      christoAmt:0.0, christoScale:0.10, christoCx:0.22, christoCy:0.30,
      mandorlaAmt:0.0, mandorlaCx:0.52, mandorlaCy:0.45, mandorlaScale:0.30,
      tallyAmt:0.0, letterAmt:0.0, letterRadius:0.165,
      eyeAmt:0.0, eyeN:14.0, eyeRadius:0.225, eyeScale:0.026,   // ophanim eye-ring removed (set eyeAmt>0 to bring it back)
    };

    const head = new TalkingHead(avatarEl, {
      ttsEndpoint:"none", lipsyncModules:[], cameraView:"head",
      lightAmbientColor:0xfff1dc, lightAmbientIntensity:0.42,
      lightDirectColor:0xffe9c8, lightDirectIntensity:0.62,
      lightDirectPhi:0.6, lightDirectTheta:0.2, lightSpotIntensity:0,
    });

    const avatarUrl = new URLSearchParams(location.search).get("url") || "docs/base/oracle-icon-heart.glb?v=19";
    await head.showAvatar({ url:avatarUrl, body:"F", avatarMood:"neutral", lipsyncLang:"en",
        avatarIdleEyeContact:0.98, avatarIdleHeadMove:0.015,
        avatarSpeakingEyeContact:0.98, avatarSpeakingHeadMove:0.06 },
      (ev)=>{ if(ev.lengthComputable) hud.textContent = "loading "+Math.round(ev.loaded/ev.total*100)+"%"; });

    window.head = head;  // dev: expose for live console tuning, e.g. head.gestureTemplates.strikeBreast["RightForeArm.rotation"].z = -1.6; head.playGesture("strikeBreast",4,false,450)
    const scene = head.scene, camera = head.camera, renderer = head.renderer;
    renderer.toneMapping = THREE.NoToneMapping;
    scene.background = new THREE.Color(ICON.groundR, ICON.groundG, ICON.groundB);
    camera.fov = 8; camera.position.set(0,1.66,7.0); camera.updateProjectionMatrix();  // fov-8 lens at pz 7.0 — matches the production kiosk frame (index.html)
    if (head.controls){ head.controls.target.set(0,1.66,0); head.controls.update(); }

    // Materials (unchanged icon grade)
    scene.traverse((o)=>{
      if (!o.isMesh) return;
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach((m)=>{
        if (!m) return;
        const n = (m.name||"") + "|" + (o.name||"");
        if (m.name === "OracleSkin" || (/skin|base/i.test(n) && o.name === "Human")) {
          m.roughness=0.95; m.metalness=0.0;
          if (m.color) m.color.setRGB(0.88,0.84,0.80);   // pale porcelain flesh (ref-matched)
          // Catholic tattoos baked into OracleSkin: gold lines in Base Color + gold gild in emissiveMap (no dark outline).
          if (m.emissive){ m.emissive.setRGB(1,1,1); m.emissiveIntensity = (window.__tatEmis||1.8); } m.needsUpdate=true;
        } else if (m.name === "IconGold") {
          m.roughness=0.85; m.metalness=0.10;
          if (m.color) m.color.setRGB(0.74,0.58,0.16);
          if (m.emissive){ m.emissive.setRGB(0.541,0.416,0.118); m.emissiveIntensity=0.42; } m.needsUpdate=true;
        } else if (m.name === "IconCross") {
          m.roughness=0.8; m.metalness=0.08;
          if (m.color) m.color.setRGB(0.80,0.66,0.30);
          if (m.emissive){ m.emissive.setRGB(0.42,0.34,0.16); m.emissiveIntensity=0.28; } m.needsUpdate=true;
        } else if (m.name === "IconDot") {
          m.roughness=0.9; m.metalness=0.0;
          if (m.color) m.color.setRGB(0.165,0.122,0.086);
          if (m.emissive) m.emissiveIntensity=0.0; m.needsUpdate=true;
        }
      });
    });

    // --- Lighting: even + frontal + warm (ref-matched). Soften the key and lift the fill so neither side of the
    // body falls into shadow — the reference figure is bathed in a soft, near-shadowless warm glow. Live-tunable. ---
    const LIGHT = window.LIGHT = { amb:0.46, key:0.24, keyX:0.05, keyY:1.70, keyZ:2.30 };
    function applyLights(){
      scene.traverse((o)=>{
        if (o.isAmbientLight){ o.intensity = LIGHT.amb; if(o.color) o.color.setHex(0xfff1dc); }
        else if (o.isDirectionalLight){ o.intensity = LIGHT.key; if(o.color) o.color.setHex(0xffe9c8);
          o.position.set(LIGHT.keyX, LIGHT.keyY, LIGHT.keyZ); }
      });
    }
    applyLights();

    const ICONGRADE = {
      uniforms: {
        tDiffuse:{value:null}, res:{value:new THREE.Vector2(1,1)},
        crackStrength:{value:ICON.crackStrength}, crackScale:{value:ICON.crackScale},
        toothAmount:{value:ICON.toothAmount}, terreVerte:{value:ICON.terreVerte},
        duoAmount:{value:ICON.duoAmount}, desat:{value:ICON.desat},
        vignette:{value:ICON.vignette}, exposure:{value:ICON.exposure},
        lvOn:{value:1}, beat:{value:0},
        ledgerAmt:{value:LV.ledgerAmt}, ledgerRows:{value:LV.ledgerRows}, ledgerCols:{value:LV.ledgerCols},
        rayAmt:{value:LV.rayAmt}, rayN:{value:LV.rayN}, rayFall:{value:LV.rayFall}, crossAmt:{value:LV.crossAmt},
        headC:{value:new THREE.Vector2(LV.headCx, LV.headCy)},
        heartC:{value:new THREE.Vector2(LV.heartCx, LV.heartCy)},
        heartScale:{value:LV.heartScale}, heartYoff:{value:LV.heartYoff},
        heartAmt:{value:LV.heartAmt}, thornAmt:{value:LV.thornAmt}, crossTop:{value:LV.crossTop},
        christoAmt:{value:LV.christoAmt}, christoScale:{value:LV.christoScale}, christoC:{value:new THREE.Vector2(LV.christoCx, LV.christoCy)},
        mandorlaAmt:{value:LV.mandorlaAmt}, mandorlaScale:{value:LV.mandorlaScale}, breathe:{value:0}, mandorlaC:{value:new THREE.Vector2(LV.mandorlaCx, LV.mandorlaCy)},
        tallyAmt:{value:LV.tallyAmt}, letterAmt:{value:LV.letterAmt}, letterRadius:{value:LV.letterRadius},
        eyeAmt:{value:LV.eyeAmt}, eyeN:{value:LV.eyeN}, eyeRadius:{value:LV.eyeRadius}, eyeScale:{value:LV.eyeScale}, blink:{value:0}, blinkIndex:{value:0},
        atmoOn:{value:ATMO.on}, glowC:{value:new THREE.Vector2(ATMO.glowCx,ATMO.glowCy)},
        haloAmt:{value:ATMO.haloAmt}, haloTight:{value:ATMO.haloTight},
        floorAmt:{value:ATMO.floorAmt}, floorTop:{value:ATMO.floorTop}, floorWidth:{value:ATMO.floorWidth},
        warmCol:{value:new THREE.Color(ATMO.warmR,ATMO.warmG,ATMO.warmB)}, bgGate:{value:new THREE.Vector2(ATMO.bgLo,ATMO.bgHi)},
        craqGlobal:{value:ICON.craqGlobal},
      },
      vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader:`
        precision highp float;
        varying vec2 vUv;
        uniform sampler2D tDiffuse; uniform vec2 res;
        uniform float crackStrength, crackScale, toothAmount, terreVerte, duoAmount, desat, vignette, exposure;
        uniform float lvOn, beat, ledgerAmt, ledgerRows, ledgerCols, rayAmt, rayN, rayFall, crossAmt;
        uniform float heartScale, heartYoff, heartAmt, thornAmt, crossTop;
        uniform vec2 headC, heartC;
        uniform float christoAmt, christoScale; uniform vec2 christoC;
        uniform float mandorlaAmt, mandorlaScale, breathe; uniform vec2 mandorlaC;
        uniform float tallyAmt, letterAmt, letterRadius;
        uniform float eyeAmt, eyeN, eyeRadius, eyeScale, blink, blinkIndex;
        uniform float atmoOn, haloAmt, haloTight, floorAmt, floorTop, floorWidth;
        uniform vec2 glowC, bgGate; uniform vec3 warmCol;
        uniform float craqGlobal;
        float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
        float vnoise(vec2 p){ vec2 i=floor(p), f=fract(p);
          float a=hash(i), b=hash(i+vec2(1.0,0.0)), c=hash(i+vec2(0.0,1.0)), d=hash(i+vec2(1.0,1.0));
          vec2 u=f*f*(3.0-2.0*f); return mix(mix(a,b,u.x), mix(c,d,u.x), u.y); }
        float fbm(vec2 p){ float s=0.0,a=0.5; for(int i=0;i<3;i++){ s+=a*vnoise(p); p*=2.0; a*=0.5; } return s; }
        vec2 worley(vec2 p){ vec2 ip=floor(p), fp=fract(p); float f1=9.0,f2=9.0;
          for(int y=-1;y<=1;y++){ for(int x=-1;x<=1;x++){ vec2 g=vec2(float(x),float(y));
            vec2 o=vec2(hash(ip+g), hash(ip+g+vec2(31.0,17.0))); vec2 r=g+o-fp; float d=dot(r,r);
            if(d<f1){ f2=f1; f1=d; } else if(d<f2){ f2=d; } }}
          return vec2(sqrt(f1), sqrt(f2)); }
        float dot2(vec2 v){ return dot(v,v); }
        // ---- emblem helpers (Chi-Rho, nimbus glyphs, vesica) ----
        float christoStroke(vec2 p, vec2 a, vec2 b, float w){
          vec2 pa = p-a, ba = b-a;
          float h = clamp(dot(pa,ba)/dot(ba,ba), 0.0, 1.0);
          return smoothstep(w, w*0.45, length(pa - ba*h));
        }
        float christoMask(vec2 q){
          float sw = 0.16;
          float strokes = 0.0;
          strokes = max(strokes, christoStroke(q, vec2(-0.7,-0.85), vec2( 0.7, 0.85), sw));
          strokes = max(strokes, christoStroke(q, vec2( 0.7,-0.85), vec2(-0.7, 0.85), sw));
          strokes = max(strokes, christoStroke(q, vec2( 0.0,-0.95), vec2( 0.0, 0.95), sw));
          vec2 lc = vec2(0.18, 0.55); float lr = 0.30;
          float ring = smoothstep(0.13, 0.05, abs(length(q-lc)-lr));
          ring *= step(q.x, lc.x+lr);
          strokes = max(strokes, ring);
          vec2 g = fract(q*4.5) - 0.5;
          float punch = smoothstep(0.34, 0.20, length(g));
          return strokes * punch;
        }
        float sdRing(vec2 p, float R, float w){ return abs(length(p) - R) - w; }
        float sdCircle(vec2 p, float r){ return length(p)-r; }
        float sdSeg(vec2 p, vec2 a, vec2 b){ vec2 pa=p-a, ba=b-a; float h=clamp(dot(pa,ba)/dot2(ba),0.0,1.0); return length(pa-ba*h); }
        float glyphMask(vec2 q, int id, float w){
          float d = 1e3;
          if(id==0){ d = abs(length(q)-0.55) - w; }
          else if(id==1){
            float ring = abs(length(q)-0.55) - w;
            float gap = smoothstep(0.0,0.02, -q.y-0.30) * step(abs(q.x),0.30);
            ring = mix(ring, 1.0, gap);
            float footL = sdSeg(q, vec2(-0.42,-0.30), vec2(-0.18,-0.55)) - w;
            float footR = sdSeg(q, vec2( 0.42,-0.30), vec2( 0.18,-0.55)) - w;
            d = min(ring, min(footL, footR));
          } else {
            float vL = sdSeg(q, vec2(-0.40,-0.55), vec2(-0.40,0.55)) - w;
            float vR = sdSeg(q, vec2( 0.40,-0.55), vec2( 0.40,0.55)) - w;
            float di = sdSeg(q, vec2(-0.40, 0.55), vec2( 0.40,-0.55)) - w;
            d = min(vL, min(vR, di));
          }
          return smoothstep(0.02, 0.0, d);
        }
        float sdVesica(vec2 p, float r){ p=abs(p);
          float d = r*0.5;
          float b = sqrt(max(r*r-d*d,0.0));
          return ((p.y-b)*d > p.x*b) ? length(p-vec2(0.0,b))
                                     : length(p-vec2(-d,0.0))-r; }
        float sdEyeVesica(vec2 p, float w, float h){
          p = abs(p);
          float d = (h<=0.0) ? 1e4 : (w*w - h*h)/(2.0*h);
          float r = sqrt(w*w + d*d);
          return (p.y*d > p.x*(-d) ) ? length(p - vec2(0.0, d)) - r
                                     : length(p - vec2(-w, 0.0));
        }
        float sdHeart(vec2 p){ p.x=abs(p.x);
          if(p.y+p.x>1.0) return sqrt(dot2(p-vec2(0.25,0.75)))-sqrt(2.0)/4.0;
          return sqrt(min(dot2(p-vec2(0.0,1.0)), dot2(p-0.5*max(p.x+p.y,0.0))))*sign(p.x-p.y); }
        void main(){
          vec3 c = texture2D(tDiffuse, vUv).rgb;
          vec2 ar = vec2(res.x/res.y, 1.0);
          vec2 puv = vUv*ar;
          float lo=0.03, hi=0.94; c = lo + c*(hi-lo); c = mix(vec3(0.5), c, 0.90);
          float l = dot(c, vec3(0.299,0.587,0.114));
          c *= vec3(1.06,1.0,0.86); c = mix(vec3(l), c, desat);
          vec3 shadowCol=vec3(0.27,0.16,0.09), highCol=vec3(1.0,0.93,0.74);
          vec3 duo = mix(shadowCol, highCol, smoothstep(0.0,1.0,l));
          c = mix(c, c*duo*1.35, duoAmount); c = mix(c, c*vec3(1.04,0.97,0.80), 0.5);
          vec3 terre=vec3(0.43,0.42,0.30); c = mix(c, terre, (1.0-l)*terreVerte);
          float tooth = vnoise(puv*220.0); c *= 1.0 + (tooth-0.5)*toothAmount;
          vec2 w = worley(puv*crackScale);
          float crack = 1.0 - smoothstep(0.0, 0.035, w.y - w.x);
          crack *= 0.55 + 0.9*fbm(puv*120.0);
          c = mix(c, c*vec3(0.55,0.42,0.30), clamp(crack,0.0,1.0)*crackStrength);

          // ===== LEVELED LAYER (gold-on-gold, representational) =====
          if (lvOn > 0.5) {
            float lc = dot(c, vec3(0.299,0.587,0.114));
            float goldMask = smoothstep(0.42, 0.66, lc);
            // (1) glory sunburst behind the head, in the gold field
            vec2 pr = (vUv - headC)*ar;
            float ang = atan(pr.y, pr.x);
            float rays = pow(0.5+0.5*sin(ang*rayN), 5.0);
            float rfall = smoothstep(rayFall, 0.04, length(pr));
            c += c * rays * rfall * rayAmt * goldMask;
            // (2) gold field as ruled indulgence form (ledger lines + punch-card columns)
            float ly = abs(fract(vUv.y*ledgerRows)-0.5);
            float lrow = smoothstep(0.02,0.0, ly-0.46);
            float lx = abs(fract(vUv.x*ledgerCols)-0.5);
            float lcol = smoothstep(0.02,0.0, lx-0.46);
            c *= 1.0 - ledgerAmt*goldMask*max(lrow, lcol*0.7);
            // (3) cruciform nimbus bars through the head center
            float cv = smoothstep(0.010,0.0, abs(vUv.x-headC.x));
            float ch = smoothstep(0.010,0.0, abs(vUv.y-headC.y));
            c += c * max(cv,ch) * crossAmt * goldMask;
            // (4) punch-card Chi-Rho (christogram) — holy NAME as machine-readable holes, no letters
            {
              vec2 chi = (vUv - christoC)*ar / christoScale;
              float holes = christoMask(chi);
              c = mix(c, c*0.32, holes*christoAmt*goldMask);
            }
            // ---- nimbus upgrade: tally cells + faint halo letters (uses pr from glory block) ----
            float barV = smoothstep(0.018,0.0, abs(pr.x));
            float barH = smoothstep(0.018,0.0, abs(pr.y));
            float tickSp = 0.045;
            float halfW  = 0.006;
            float tvY = abs(fract(pr.y/tickSp)-0.5)*tickSp;
            float tickOnV = smoothstep(halfW, 0.0, tvY) * step(abs(pr.x), 0.030) * step(0.024, abs(pr.x)) * barV;
            float txX = abs(fract(pr.x/tickSp)-0.5)*tickSp;
            float tickOnH = smoothstep(halfW, 0.0, txX) * step(abs(pr.y), 0.030) * step(0.024, abs(pr.y)) * barH;
            float tally = clamp(tickOnV + tickOnH, 0.0, 1.0);
            c = mix(c, c*0.45, tally * tallyAmt * goldMask);
            float gs = 0.085;
            float stroke = 0.10;
            vec2 qO = (pr - vec2(-letterRadius, 0.0)) / gs;
            float gO = glyphMask(qO, 0, stroke);
            vec2 qW = (pr - vec2(0.0, letterRadius)) / gs;
            float gW = glyphMask(qW, 1, stroke);
            vec2 qN = (pr - vec2(letterRadius, 0.0)) / gs;
            float gN = glyphMask(qN, 2, stroke);
            float letters = clamp(gO + gW + gN, 0.0, 1.0);
            c = mix(c, c*0.50, letters * letterAmt * goldMask);
            c += c * letters * letterAmt * 0.35 * goldMask;
          }
          // ===== WARM SANCTUARY ATMOSPHERE: PAINT a clean warm radial gradient onto the ground =====
          // The base icon-grade lifts shadows toward grey, so an additive glow barely reads and corners can't go
          // dark. Instead, on background pixels (gated out of the bright figure by luminance) we OVERWRITE with a
          // radial field: bright warm burst behind the halo -> deep warm-black corners, plus a floor pool of light.
          if (atmoOn > 0.5) {
            float lumA = dot(c, vec3(0.299,0.587,0.114));
            float bgN  = 1.0 - smoothstep(bgGate.x, bgGate.y, lumA);   // 1 on dark ground, 0 on the bright figure
            vec2 gp = (vUv - glowC); gp.x *= ar.x; gp.y *= 0.78;       // vertical oval: cradles the head + torso

            float fy = smoothstep(floorTop, 0.0, vUv.y);               // rises toward the bottom edge
            float fx = smoothstep(floorWidth, 0.0, abs(vUv.x-0.5));    // centred pool
            float S  = clamp(halo*haloAmt + fy*fx*floorAmt + 0.06, 0.0, 1.0);
            vec3 cornerCol = vec3(0.045,0.032,0.020);                  // deep warm near-black at the edges
            vec3 bgCol = mix(cornerCol, warmCol, S*S);                 // S*S keeps the falloff snappy/luminous
            c = mix(c, bgCol, bgN);

          vec2 p = vUv-0.5;
          float r = length(p) * (1.0 + (fbm(puv*3.0)-0.5)*0.10);

          vec3 edge = mix(vec3(0.40,0.30,0.20), vec3(1.0), v);
          c *= mix(vec3(1.0), edge, clamp(vignette,0.0,1.4));

            vec2 mp = (vUv - mandorlaC)*ar;
            float mscale = mandorlaScale * (1.0 + 0.012*breathe);
            float md = sdVesica(vec2(mp.x, mp.y/1.35)/mscale, 0.62);
            md *= mscale;

            float glow    = smoothstep(0.045, 0.0, abs(md)) * 0.35;
            float lift    = (outline + glow) * mandorlaAmt * (0.72 + 0.28*(0.5+0.5*breathe));

            vec2 ep = (vUv - headC) * ar;
            float eang = atan(ep.y, ep.x);
            float rad = length(ep);
            float TAU = 6.2831853;
            float sectF = (eang/TAU + 0.5) * eyeN;
            float sIdx  = floor(sectF);
            float fa    = (fract(sectF) - 0.5) * (TAU/eyeN);
            vec2 lp = vec2(rad*fa, rad - eyeRadius);
            float isBlink = step(0.5, 1.0 - abs(sIdx - blinkIndex));
            float lid = clamp(blink,0.0,1.0) * isBlink;
            float hOpen = eyeScale * (1.0 - 0.92*lid);
            float dA = sdEyeVesica(lp, eyeScale*1.7, hOpen + 1e-4);
            float dI = length(lp / vec2(1.0, max(hOpen/(eyeScale*0.95),0.06))) - eyeScale*0.62;
            float dP = length(lp) - eyeScale*0.26;
            float aa = eyeScale*0.18 + 1e-4;
            float mOut  = smoothstep(aa, -aa, abs(dA) - eyeScale*0.13);
            float mIris = smoothstep(aa, -aa, dI);
            float mPup  = smoothstep(aa, -aa, dP);
            float lidShade = smoothstep(aa,-aa, dA) * lid;
            vec3 punch  = vec3(0.165,0.122,0.086);
            vec3 chill  = vec3(0.43,0.42,0.30);
            c = mix(c, chill, mIris * eyeAmt * 0.85 * goldMask);
            c = mix(c, punch, mPup  * eyeAmt * goldMask);
            c = mix(c, c*vec3(0.45,0.36,0.26), mOut * eyeAmt * goldMask);
            c = mix(c, mix(c, c*0.78, 0.6), lidShade * eyeAmt * goldMask);

          if (craqGlobal > 0.001) {

      "LeftHandIndex1.rotation":{x:0.05,y:0,z:0}, "LeftHandMiddle1.rotation":{x:0.05,y:0,z:0},
      "LeftHandRing1.rotation":{x:0.06,y:0,z:0}, "LeftHandPinky1.rotation":{x:0.08,y:0,z:0},
      "LeftHandThumb1.rotation":{x:0.2,y:0.2,z:0.3},
    };
    const _signFingersOpen = {
      "RightHandIndex1.rotation":{x:-0.05,y:0,z:0}, "RightHandMiddle1.rotation":{x:-0.05,y:0.04,z:0},
      "RightHandRing1.rotation":{x:-0.05,y:0,z:0}, "RightHandPinky1.rotation":{x:-0.05,y:0,z:0},
      "RightHandThumb1.rotation":{x:0.1,y:-0.25,z:-0.4},
    };
    head.gestureTemplates["signFore"] = Object.assign({
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:0.85,y:-0.35,z:-1.00},
      "RightForeArm.rotation":{x:0.0,y:0.30,z:-2.05}, "RightHand.rotation":{x:-0.30,y:-0.55,z:-0.20},
    }, _signFingersOpen);
    head.gestureTemplates["signChest"] = Object.assign({
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:1.20,y:-0.25,z:-0.70},
      "RightForeArm.rotation":{x:0.0,y:0.20,z:-1.30}, "RightHand.rotation":{x:-0.20,y:-0.30,z:-0.05},
    }, _signFingersOpen);
    head.gestureTemplates["signLeftSh"] = Object.assign({
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:1.05,y:0.10,z:-0.35},
      "RightForeArm.rotation":{x:0.0,y:0.10,z:-1.55}, "RightHand.rotation":{x:-0.20,y:-0.20,z:0.0},
    }, _signFingersOpen);
    head.gestureTemplates["signRightSh"] = Object.assign({
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:1.05,y:-0.55,z:-1.05},
      "RightForeArm.rotation":{x:0.0,y:0.35,z:-1.20}, "RightHand.rotation":{x:-0.20,y:-0.45,z:-0.15},
    }, _signFingersOpen);
    function playSignOfCross(){
      head.playGesture("signFore", 1.5, false, 900);
      setTimeout(()=> head.playGesture("signChest",   1.5, false, 700), 1200);
      setTimeout(()=> head.playGesture("signLeftSh",  1.5, false, 700), 2400);
      setTimeout(()=> head.playGesture("signRightSh", 1.5, false, 700), 3600);
    }

    /* ===== NEW canonical gestures (research 2026-06-17) — UNTUNED starting poses; prototype/tune here,
            then port the winners into the kiosk OPENING_GESTURES rotation in index.html. ===== */
    // strikeBreast — Confiteor "mea culpa": closed fist drawn to the sternum + a slight head bow. Reads only
    // as MOTION, so it ships as a triple-tap (playStrikeBreast), never a static hold (frozen it == presentHeart).
    head.gestureTemplates["strikeBreast"] = {
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:0.82,y:-0.02,z:-0.94},
      "RightForeArm.rotation":{x:1.52,y:-0.98,z:-1.50}, "RightHand.rotation":{x:0.22,y:-0.56,z:-0.10},
      "RightHandIndex1.rotation":{x:1.2,y:0,z:0}, "RightHandIndex2.rotation":{x:1.4,y:0,z:0},
      "RightHandMiddle1.rotation":{x:1.2,y:0,z:0}, "RightHandMiddle2.rotation":{x:1.4,y:0,z:0},
      "RightHandRing1.rotation":{x:1.5,y:0,z:0}, "RightHandRing2.rotation":{x:1.4,y:0,z:0},
      "RightHandPinky1.rotation":{x:1.6,y:0,z:0}, "RightHandPinky2.rotation":{x:1.3,y:0,z:0},
      "RightHandThumb1.rotation":{x:0.6,y:-0.2,z:-0.6}, "RightHandThumb2.rotation":{x:0.2,y:0.04,z:0.6},
      "Neck.rotation":{x:0.16,y:0,z:0}, "Head.rotation":{x:0.16,y:0,z:0},
    };
    // fist lifted slightly off the chest, between taps (forearm a touch less flexed)
    head.gestureTemplates["strikeBreastLift"] = {
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:0.82,y:0.18,z:-0.86},
      "RightForeArm.rotation":{x:1.52,y:-0.68,z:-1.42}, "RightHand.rotation":{x:-0.12,y:-0.28,z:0.04},
      "RightHandIndex1.rotation":{x:1.2,y:0,z:0}, "RightHandIndex2.rotation":{x:1.4,y:0,z:0},
      "RightHandMiddle1.rotation":{x:1.2,y:0,z:0}, "RightHandMiddle2.rotation":{x:1.4,y:0,z:0},
      "RightHandRing1.rotation":{x:1.5,y:0,z:0}, "RightHandRing2.rotation":{x:1.4,y:0,z:0},
      "RightHandPinky1.rotation":{x:1.6,y:0,z:0}, "RightHandPinky2.rotation":{x:1.3,y:0,z:0},
      "RightHandThumb1.rotation":{x:0.6,y:-0.2,z:-0.6}, "RightHandThumb2.rotation":{x:0.2,y:0.04,z:0.6},
      "Neck.rotation":{x:0.14,y:0,z:0}, "Head.rotation":{x:0.14,y:0,z:0},
    };
    function playStrikeBreast(){            // "mea culpa, mea culpa, mea maxima culpa" — three percussive taps
      head.playGesture("strikeBreast",     4, false, 450);
      setTimeout(()=> head.playGesture("strikeBreastLift", 1, false, 180),  650);
      setTimeout(()=> head.playGesture("strikeBreast",     1, false, 160),  880);
      setTimeout(()=> head.playGesture("strikeBreastLift", 1, false, 180), 1120);
      setTimeout(()=> head.playGesture("strikeBreast",     4, false, 160), 1360);
    }

    // misereatur — joined palm-to-palm prayer hands on the centerline (pre-absolution intercession); orans pulled in
    head.gestureTemplates["misereatur"] = {
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:0.90,y:-0.22,z:-1.20},
      "RightForeArm.rotation":{x:-0.08,y:0.64,z:-2.10}, "RightHand.rotation":{x:-0.18,y:0.84,z:-0.28},
      "RightHandIndex1.rotation":{x:0.0,y:0,z:0}, "RightHandMiddle1.rotation":{x:0.0,y:0,z:0},
      "RightHandRing1.rotation":{x:0.0,y:0,z:0}, "RightHandPinky1.rotation":{x:0.0,y:0,z:0},
      "RightHandThumb1.rotation":{x:0.1,y:-0.2,z:-0.3},
      "LeftShoulder.rotation":{x:1.758,y:-0.099,z:-1.604}, "LeftArm.rotation":{x:0.90,y:0.22,z:1.20},
      "LeftForeArm.rotation":{x:-0.08,y:-0.64,z:2.10}, "LeftHand.rotation":{x:-0.18,y:-0.84,z:0.28},
      "LeftHandIndex1.rotation":{x:0.0,y:0,z:0}, "LeftHandMiddle1.rotation":{x:0.0,y:0,z:0},
      "LeftHandRing1.rotation":{x:0.0,y:0,z:0}, "LeftHandPinky1.rotation":{x:0.0,y:0,z:0},
      "LeftHandThumb1.rotation":{x:0.1,y:0.2,z:0.3},
      "Neck.rotation":{x:0.12,y:0,z:0}, "Head.rotation":{x:0.30,y:0,z:0},
    };

    // receive — arms crossed over the chest (Byzantine approach / repose). A listening/rest state, not a rite beat.
    // WATCH the bottom frame edge: the forearm-crossing point can dip below y~1.34 at fov 8.
    head.gestureTemplates["receive"] = {
      "RightShoulder.rotation":{x:1.758,y:0.099,z:1.604}, "RightArm.rotation":{x:1.30,y:0.10,z:-0.25},
      "RightForeArm.rotation":{x:0.0,y:0.10,z:-1.85}, "RightHand.rotation":{x:-0.10,y:-0.20,z:-0.30},
      "RightHandIndex1.rotation":{x:0.05,y:0,z:0}, "RightHandMiddle1.rotation":{x:0.05,y:0,z:0},
      "RightHandRing1.rotation":{x:0.05,y:0,z:0}, "RightHandPinky1.rotation":{x:0.05,y:0,z:0},
      "RightHandThumb1.rotation":{x:0.1,y:-0.2,z:-0.3},
      "LeftShoulder.rotation":{x:1.758,y:-0.099,z:-1.604}, "LeftArm.rotation":{x:1.30,y:-0.10,z:0.25},
      "LeftForeArm.rotation":{x:0.0,y:-0.10,z:1.85}, "LeftHand.rotation":{x:-0.10,y:0.20,z:0.30},
      "LeftHandIndex1.rotation":{x:0.05,y:0,z:0}, "LeftHandMiddle1.rotation":{x:0.05,y:0,z:0},
      "LeftHandRing1.rotation":{x:0.05,y:0,z:0}, "LeftHandPinky1.rotation":{x:0.05,y:0,z:0},
      "LeftHandThumb1.rotation":{x:0.1,y:0.2,z:0.3},
    };
    (function(){
      const ctl = document.getElementById("ctl");
      const mk = (id,label,fn)=>{ const b=document.createElement("button"); b.id=id; b.textContent=label; b.onclick=fn; ctl.appendChild(b); return b; };
      mk("speakb",   "speak",     ()=> head.playGesture("speak", 4, false, 700));
      mk("oransb",   "orans",     ()=> playWide("orans", 6));
      mk("epib",     "epiclesis", ()=> playWide("epiclesis", 6));
      mk("crossb",   "sign",      ()=> playSignOfCross());
      mk("breastb",  "strike",    ()=> playStrikeBreast());                              // NEW: Confiteor triple-tap
      mk("misb",     "misereatur",()=> head.playGesture("misereatur", 6, false, 900));  // NEW: joined prayer hands
      mk("recvb",    "receive",   ()=> head.playGesture("receive",    6, false, 900));  // NEW: arms crossed
    })();

    /* ===================== verdict-rite (orchestration) ===================== */
    (function(){
      let isDelivering = false;
      const sleep = ms => new Promise(r=>setTimeout(r, ms));
      async function runVerdictRite(){
        if(isDelivering) return;
        isDelivering = true;
        const sB = LV.bpm, sD = LV.beatDepth;
        try{
          LV.bpm = 84; LV.beatDepth = 1.0;
          await sleep(900);
          head.playGesture("orans", 2.6, false, 900);
          await sleep(1100);
          const signs = ["signFore","signChest","signLeftSh","signRightSh"];
          for(let i=0;i<signs.length;i++){
            head.playGesture(signs[i], 0.5, false, 250);
            await sleep(430);
          }
          head.playGesture("absolve", 4, false, 700);
          await sleep(3600);
        } finally {
          LV.bpm = sB; LV.beatDepth = sD;
          isDelivering = false;
        }
      }
      window.runVerdictRite = runVerdictRite;
      const ctl = document.getElementById("ctl");
      const mkBtn = (label, fn)=>{ const b=document.createElement("button"); b.textContent=label; b.onclick=fn; ctl.appendChild(b); return b; };
      mkBtn("rite", ()=>runVerdictRite());
      let weighTimer = null;
      mkBtn("weigh", function(){
        if(weighTimer) return;                  // already swinging — ignore re-click
        let n = 0; const passes = 5;            // a few swings of the scales, then settle back to idle
        head.playGesture("weighA", 1.2, false, 600);
        weighTimer = setInterval(()=>{
          if(++n >= passes){ clearInterval(weighTimer); weighTimer = null; return; }
          head.playGesture(n % 2 ? "weighB" : "weighA", 1.2, false, 600);
        }, 1200);
      });
    })();
    /* =================== end verdict-rite (orchestration) =================== */

    /* ===================== gesture tuner (dev UI): live sliders for pose bones ===================== */
    (function(){
      const EDITABLE = ["strikeBreast","strikeBreastLift","misereatur","receive",
                        "bless","blessLatin","presentHeart","absolve","speak","orans","epiclesis","weighA","weighB"];
      const BONES = ["RightArm.rotation","RightForeArm.rotation","RightHand.rotation","Neck.rotation","Head.rotation"];
      const AXES = ["x","y","z"];
      const panel = document.createElement("div");
      panel.id = "tune";
      panel.innerHTML =
        '<div class="tune-row tune-head"><select id="tune-sel"></select>'
        + '<button id="tune-play">▶ play</button>'
        + '<label><input type="checkbox" id="tune-mirror" checked>mirror&nbsp;L</label></div>'
        + '<div id="tune-sliders"></div>'
        + '<div class="tune-row"><button id="tune-copy">copy values</button><span id="tune-msg"></span></div>';
      document.body.appendChild(panel);
      const sel = panel.querySelector("#tune-sel");
      const slidersEl = panel.querySelector("#tune-sliders");
      const mirrorEl = panel.querySelector("#tune-mirror");
      const msg = panel.querySelector("#tune-msg");
      EDITABLE.forEach(n=>{ if(head.gestureTemplates[n]){ const o=document.createElement("option"); o.value=n; o.textContent=n; sel.appendChild(o); } });

      function applyMirror(name){           // two-hand poses: mirror Right* -> Left* (x same, y & z negated)
        if(!mirrorEl.checked) return;
        const t = head.gestureTemplates[name];
        for(const b in t){ if(b.indexOf("Right")===0){ const lb=b.replace("Right","Left"); if(t[lb]){ t[lb].x=t[b].x; t[lb].y=-t[b].y; t[lb].z=-t[b].z; } } }
      }
      function hold(name){ head.playGesture(name, 6, false, 140); }   // re-hold the pose so the change shows live
      function playFull(name){ if(name==="strikeBreast"||name==="strikeBreastLift") playStrikeBreast(); else head.playGesture(name,6,false,600); }
      function buildSliders(name){
        const t = head.gestureTemplates[name]; slidersEl.innerHTML="";
        BONES.forEach(b=>{ if(!t[b]) return;
          AXES.forEach(ax=>{
            const row=document.createElement("div"); row.className="tune-row";
            const lab=document.createElement("span"); lab.className="tune-lab"; lab.textContent=b.replace(".rotation","")+"."+ax;
            const rng=document.createElement("input"); rng.type="range"; rng.min="-2.6"; rng.max="2.6"; rng.step="0.02"; rng.value=String(t[b][ax]||0);
            const num=document.createElement("span"); num.className="tune-num"; num.textContent=(t[b][ax]||0).toFixed(2);
            rng.oninput=()=>{ const v=parseFloat(rng.value); t[b][ax]=v; num.textContent=v.toFixed(2); applyMirror(name); hold(name); };
            row.append(lab,rng,num); slidersEl.appendChild(row);
          });
        });
      }
      sel.onchange=()=>{ buildSliders(sel.value); hold(sel.value); };
      panel.querySelector("#tune-play").onclick=()=> playFull(sel.value);
      panel.querySelector("#tune-copy").onclick=()=>{
        const t=head.gestureTemplates[sel.value];
        const js='head.gestureTemplates["'+sel.value+'"] = '+JSON.stringify(t,null,2)+';';
        if(navigator.clipboard) navigator.clipboard.writeText(js);
        console.log(js); msg.textContent="copied ✓"; setTimeout(()=>{ msg.textContent=""; },1400);
      };
      sel.value="strikeBreast"; buildSliders("strikeBreast");
    })();
    /* =================== end gesture tuner =================== */

    /* ===================== SACRED HEART — baked into the avatar GLB (rides the Spine2 joint) ===================== */
    (function(){
      // The heart is now a node inside the avatar GLB, parented to the Spine2 bone and seated in a chest
      // socket — so it follows every pose/gesture/breath through the rig (no per-frame repositioning needed).
      // This block only (a) pins the framing and (b) drives the furnace glow / heartbeat off the painted texture.
      window.__cam = { px:0, py:1.66, pz:7.0, tx:0, ty:1.66, tz:0 };   // heart-up frame at pz 7.0 — matches the production kiosk (index.html). Live-tune via window.__cam.pz.
      if (head.controls) head.controls.enabled = false;
      const EMIS = window.__heartEmis = { base:1.0, beat:1.0, flick:0.12 };
      const mats = window.__heartMats = [];   // baked-heart materials we drive for the heartbeat glow

      function wireHeartGlow(){
        const heart = scene.getObjectByName("SacredHeart");
        if(!heart) return false;
        window.__heart = heart;
        heart.traverse(o=>{ if(o.isMesh && o.material){
          const arr = Array.isArray(o.material) ? o.material : [o.material];
          arr.forEach(m=>{ m.emissive = new THREE.Color(1,1,1); m.emissiveMap = m.map || null;  // glow follows the painted gold/flame
                           m.emissiveIntensity = EMIS.base; m.needsUpdate = true; mats.push(m); });
        }});
        return true;
      }
      // the avatar mesh tree may not be attached the instant showAvatar resolves — retry briefly
      let tries = 0; (function waitForHeart(){ if(wireHeartGlow() || tries++ > 180) return; requestAnimationFrame(waitForHeart); })();

      function beatLoop(){
        const t=performance.now()*0.001, ph=(t*(LV.bpm/60.0))%1.0;
        const s1=Math.pow(Math.max(0,Math.sin(ph*Math.PI*2)),8.0);
        const s2=0.6*Math.pow(Math.max(0,Math.sin((ph-0.16)*Math.PI*2)),8.0);
        const beat=Math.min(1.0,(s1+(ph<0.34?s2:0)))*LV.beatDepth;
        const ei=EMIS.base*(0.85+EMIS.beat*beat)*(1.0+EMIS.flick*Math.sin(t*8.0));
        for(let i=0;i<mats.length;i++) mats[i].emissiveIntensity=ei;
        bloomPass.strength=BLOOM.strength; bloomPass.radius=BLOOM.radius; bloomPass.threshold=BLOOM.threshold;
        requestAnimationFrame(beatLoop);
      }
      beatLoop();
    })();
    /* =================== end Sacred Heart =================== */

  </script>
</body>
