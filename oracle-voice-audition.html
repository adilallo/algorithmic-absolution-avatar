<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oracle voice audition</title>
<style>
  html, body { width:100%; height:100%; margin:0; background:#0c0a08; color:#e8dcc0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; overflow:hidden; }
  #avatar { position:fixed; inset:0; }
  #panel { position:fixed; top:0; right:0; width:360px; max-height:100vh; overflow:auto;
    background:rgba(12,10,8,.85); border-left:1px solid #2a2218; padding:14px 16px; box-sizing:border-box; backdrop-filter:blur(3px); }
  h1 { font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:#d8c08a; margin:0 0 10px; }
  h2 { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#8a7c58; margin:16px 0 2px; border-top:1px solid #241d14; padding-top:10px; }
  label { display:flex; justify-content:space-between; align-items:baseline; font-size:11px; color:#b6a880; margin:9px 0 3px; letter-spacing:.02em; }
  label output { color:#e8dcc0; font-variant-numeric:tabular-nums; font-size:12px; }
  select { width:100%; box-sizing:border-box; background:#17120c; color:#e8dcc0; border:1px solid #3a3020; border-radius:5px; padding:7px 8px; font-size:13px; margin-bottom:2px; }
  textarea { width:100%; box-sizing:border-box; background:#17120c; color:#e8dcc0; border:1px solid #3a3020; border-radius:5px; padding:7px 8px; font-size:13px; height:96px; resize:vertical; line-height:1.5; }
  input[type=range] { width:100%; accent-color:#c8a84e; margin:0; }
  .btns { display:flex; gap:8px; margin-top:12px; }
  button { flex:1; font:13px ui-monospace, Menlo, monospace; color:#1a120a; background:#d8c08a; border:0; padding:10px; border-radius:6px; cursor:pointer; }
  button.sec { background:#3a3020; color:#d8c08a; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  #dump { width:100%; box-sizing:border-box; background:#0a0805; color:#9ec89e; border:1px solid #241d14; border-radius:5px;
    padding:8px; font:11px ui-monospace, Menlo, monospace; white-space:pre-wrap; word-break:break-word; margin-top:6px; }
  #status { position:fixed; left:12px; bottom:12px; font-size:12px; color:#9a8c68; background:rgba(0,0,0,.5); padding:6px 10px; border-radius:5px; max-width:55vw; }
  .hint { font-size:10px; color:#8a7c58; font-weight:normal; }
</style>
</head>
<body>
  <div id="avatar"></div>
  <div id="panel">
    <h1>Oracle voice audition</h1>

    <h2>Voice (server-side · free on Pi)</h2>
    <label for="voice">Voice <span class="hint">en-US female · all honor pitch + timepoints</span></label>
    <select id="voice">
      <optgroup label="Standard — free allotment">
        <option value="en-US-Standard-C" selected>en-US-Standard-C — measured, institutional</option>
        <option value="en-US-Standard-E">en-US-Standard-E — warmer, rounder</option>
        <option value="en-US-Standard-F">en-US-Standard-F — brighter, clerical</option>
        <option value="en-US-Standard-G">en-US-Standard-G — mature, administrative</option>
        <option value="en-US-Standard-H">en-US-Standard-H — lighter, crisp</option>
      </optgroup>
      <optgroup label="WaveNet — warmer/more natural (~$0 at kiosk volume)">
        <option value="en-US-Wavenet-C">en-US-Wavenet-C — warmer twin of Standard-C</option>
        <option value="en-US-Wavenet-E">en-US-Wavenet-E — warm, rounded</option>
        <option value="en-US-Wavenet-F">en-US-Wavenet-F — clear, clerical</option>
        <option value="en-US-Wavenet-G">en-US-Wavenet-G — mature, grave</option>
        <option value="en-US-Wavenet-H">en-US-Wavenet-H — lighter, present</option>
      </optgroup>
    </select>
    <label for="pitch">Pitch (semitones) <output id="pitch_o">-5</output></label>
    <input id="pitch" type="range" min="-12" max="8" step="0.5" value="-5">
    <label for="rate">Speaking rate <output id="rate_o">0.80</output></label>
    <input id="rate" type="range" min="0.4" max="1.6" step="0.01" value="0.80">

    <h2>Effects</h2>
    <label for="preset">Preset <span class="hint">loads a starting point, then tune below</span></label>
    <select id="preset">
      <option value="clear" selected>clear — shipping voice (near-dry, warm, present)</option>
      <option value="absolution">absolution — prior look (deep + reverberant)</option>
      <option value="dry">dry — clean baseline (hear the raw voice)</option>
      <option value="chamber">chamber — warmth + short room</option>
      <option value="transmission">transmission — intercom + grit</option>
      <option value="oracle">oracle — fullest sacred-bureaucratic</option>
    </select>
    <div id="fx"></div>
    <label for="ir" style="margin-top:10px">Reverb impulse <span class="hint">load a real chapel IR (wav/mp3)</span></label>
    <input id="ir" type="file" accept="audio/*,.wav,.mp3,.ogg" style="font-size:11px;color:#b6a880">
    <div class="btns" style="margin-top:6px"><button id="irclear" class="sec">Clear IR (back to synthetic)</button></div>

    <h2>Realism — mouth + face <span class="hint">hieratic-safe (no head motion)</span></h2>
    <div id="realism"></div>

    <div class="btns">
      <button id="speak" disabled>Speak</button>
      <button id="stop" class="sec">Stop</button>
    </div>

    <h2>Dialed-in settings <span class="hint">paste this back to bake it in</span></h2>
    <div id="dump"></div>
    <div class="btns"><button id="copy" class="sec">Copy settings</button></div>

    <h2>Prosody — spoken text</h2>
    <label for="demo">Demo line <span class="hint">cadenced, with — em-dash breaks</span></label>
    <select id="demo">
      <option value="">— sample lines —</option>
      <option value="cadence">Cadenced absolution (commas + em-dashes)</option>
      <option value="short">Short, grave ruling</option>
      <option value="numbers">Numbers &amp; abbrevs (test the cleaner)</option>
      <option value="readback">Read-back preamble</option>
    </select>
    <label for="clean" style="margin-top:8px"><span><input type="checkbox" id="clean"> Apply speech cleaner</span> <span class="hint">digits→words, St.→Saint, — breaks</span></label>
    <label for="text" style="margin-top:8px">Text to speak</label>
    <textarea id="text">You have come before the Office of Algorithmic Absolution. Your declaration has been received — and weighed. The harm you have named is acknowledged, recorded, and answered. By this ruling, you are absolved. Go now — and let your account reflect the balance restored. No record is kept.</textarea>
  </div>
  <div id="status">Loading…</div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
  } }
  </script>

  <script type="module">
    import { TalkingHead } from "talkinghead";
    import { installVoiceFX, applyVoiceParams, applyTtsParams, VOICE_PRESETS } from "./voice-fx.js";
    import { REALISM_DEFAULTS, speakShaped, installAudioFacial, setAffect, loadReverbIR, clearReverbIR, cleanForSpeechClient, preSpeechSettle } from "./speech-realism.js";

    const $ = (id) => document.getElementById(id);
    const setStatus = (m) => { $("status").textContent = m; };
    const avatarUrl = window.TALKINGHEAD_AVATAR_URL || "docs/base/oracle-icon-heart.glb?v=20";

    // Live FX parameter state — starts on the shipping "clear" production voice.
    const P = { ...VOICE_PRESETS.clear };
    // Live speech-realism state (mouth + face). Copied so sliders mutate it, then passed to speakShaped.
    const R = { ...REALISM_DEFAULTS };
    let facial = null; // audio-coupled facial controller (installed after the avatar loads)

    // FX sliders, generated from this spec (voice/pitch/rate handled separately above).
    // Ranges are deliberately EXTREME — pull back to taste; production bakes whatever you settle on.
    const FX_CTRLS = [
      { k: "hp",     label: "High-pass (Hz)",          min: 20,  max: 500,  step: 5 },
      { k: "warm",   label: "Warmth (dB @200)",        min: -8,  max: 18,   step: 0.5 },
      { k: "dip",    label: "Presence (dB @3k)",       min: -18, max: 12,   step: 0.5 },
      { k: "sat",    label: "Saturation (grit)",       min: 0,   max: 1,    step: 0.02 },
      { k: "wet",    label: "Transmission send",       min: 0,   max: 1,    step: 0.05 },
      { k: "bpFreq", label: "Transmission band (Hz)",  min: 200, max: 5000, step: 50 },
      { k: "bpQ",    label: "Transmission Q (sharpness)", min: 0.3, max: 14, step: 0.1 },
      { k: "revAmt", label: "Reverb amount",           min: 0,   max: 1.5,  step: 0.05 },
      { k: "revLen", label: "Reverb length (s)",       min: 0.05, max: 3.0, step: 0.05 },
    ];

    const head = new TalkingHead($("avatar"), {
      ttsEndpoint: "/tts",            // same-origin proxy injects the key server-side
      lipsyncModules: ["en"],
      cameraView: "upper",
      lightAmbientIntensity: 2.0, lightDirectIntensity: 12,
    });
    window.__head = head;

    // Build the FX slider rows.
    for (const c of FX_CTRLS) {
      const lab = document.createElement("label");
      const out = document.createElement("output"); out.id = c.k + "_o";
      lab.textContent = c.label; lab.appendChild(out);
      const inp = document.createElement("input");
      inp.type = "range"; inp.id = c.k; inp.min = c.min; inp.max = c.max; inp.step = c.step; inp.value = P[c.k];
      inp.oninput = () => { P[c.k] = parseFloat(inp.value); out.value = fmt(P[c.k]); applyVoiceParams(head, P); refreshDump(); };
      $("fx").append(lab, inp);
    }
    const fmt = (v) => (Number.isInteger(v) ? v : v.toFixed(2));
    function syncSliders() { for (const c of FX_CTRLS) { $(c.k).value = P[c.k]; $(c.k + "_o").value = fmt(P[c.k]); } }

    // Realism controls (mouth + face). Mutate R live; re-push opts to the audio-coupled controller
    // and re-apply the affect baseline immediately so tuning is audible/visible without re-speaking.
    const REALISM_CTRLS = [
      { k: "visemeLevel", label: "Viseme intensity (0.6 = lib default)", type: "range", min: 0.6, max: 1.0, step: 0.01 },
      { k: "closureBoost", label: "Crisp lip closures (PP/FF)", type: "check" },
      { k: "adaptive", label: "Duration-adaptive intensity (held vowels open more)", type: "check" },
      { k: "adaptiveAmt", label: "· adaptive amount", type: "range", min: 0, max: 0.4, step: 0.01 },
      { k: "jawMode", label: "Jaw motion", type: "select", opts: [["viseme", "viseme-coupled (recommended)"], ["audio", "loudness"], ["off", "off"]] },
      { k: "jawCouple", label: "· jaw depth (viseme mode)", type: "range", min: 0, max: 0.5, step: 0.01 },
      { k: "audioFacial", label: "Audio-coupled brow", type: "check" },
      { k: "browAmt", label: "· brow amount", type: "range", min: 0, max: 0.4, step: 0.01 },
      { k: "browAsym", label: "· brow asymmetry (L/R)", type: "range", min: 0, max: 1, step: 0.05 },
      { k: "jawAmt", label: "· jaw amount (loudness mode)", type: "range", min: 0, max: 0.4, step: 0.01 },
      { k: "gain", label: "· loudness sensitivity", type: "range", min: 0.3, max: 3, step: 0.05 },
      { k: "gapBlink", label: "Blink at pauses (clause/sentence gaps)", type: "check" },
      { k: "saccade", label: "Eye micro-movement (saccades)", type: "check" },
      { k: "saccadeAmt", label: "· saccade amount", type: "range", min: 0, max: 0.12, step: 0.005 },
      { k: "gazeDown", label: "Gaze-down at sentence ends", type: "check" },
      { k: "gazeDownAmt", label: "· gaze-down amount", type: "range", min: 0, max: 0.15, step: 0.005 },
      { k: "preBreath", label: "Pre-speech settle (breath beat)", type: "check" },
      { k: "preBreathMs", label: "· settle length (ms)", type: "range", min: 0, max: 900, step: 50 },
      { k: "affect", label: "Solemn affect baseline", type: "check" },
      { k: "affectBrow", label: "· affect brow lift", type: "range", min: 0, max: 0.3, step: 0.01 },
    ];
    function onRealismChange() {
      if (facial) facial.setOpts(R);
      setAffect(head, R.affect, R);   // live baseline preview
      refreshDump();
    }
    function addRealismRow(c) {
      const lab = document.createElement("label");
      if (c.type === "check") {
        const inp = document.createElement("input");
        inp.type = "checkbox"; inp.id = c.k; inp.checked = !!R[c.k];
        inp.onchange = () => { R[c.k] = inp.checked; onRealismChange(); };
        const wrap = document.createElement("span"); wrap.style.display = "flex"; wrap.style.gap = "6px"; wrap.style.alignItems = "center";
        wrap.append(inp, document.createTextNode(c.label));
        lab.appendChild(wrap); $("realism").append(lab);
      } else if (c.type === "select") {
        lab.textContent = c.label;
        const sel = document.createElement("select"); sel.id = c.k;
        for (const [v, t] of c.opts) { const o = document.createElement("option"); o.value = v; o.textContent = t; if (R[c.k] === v) o.selected = true; sel.appendChild(o); }
        sel.onchange = () => { R[c.k] = sel.value; onRealismChange(); };
        $("realism").append(lab, sel);
      } else {
        const out = document.createElement("output"); out.id = c.k + "_o"; out.value = fmt(R[c.k]);
        lab.textContent = c.label; lab.appendChild(out);
        const inp = document.createElement("input");
        inp.type = "range"; inp.id = c.k; inp.min = c.min; inp.max = c.max; inp.step = c.step; inp.value = R[c.k];
        inp.oninput = () => { R[c.k] = parseFloat(inp.value); out.value = fmt(R[c.k]); onRealismChange(); };
        $("realism").append(lab, inp);
      }
    }
    for (const c of REALISM_CTRLS) addRealismRow(c);
    // ttsTrimEnd lives on head.opt (not R): trailing-silence trim in ms. At rate 0.80 the 400ms default
    // can clip the final viseme; lower it to hold the last mouth shape out to the end of the audio.
    (() => {
      const lab = document.createElement("label"); lab.textContent = "Trim end (ms) — last-viseme clip fix";
      const out = document.createElement("output"); out.id = "ttsTrimEnd_o"; out.value = head.opt.ttsTrimEnd; lab.appendChild(out);
      const inp = document.createElement("input"); inp.type = "range"; inp.id = "ttsTrimEnd"; inp.min = 0; inp.max = 600; inp.step = 10; inp.value = head.opt.ttsTrimEnd;
      inp.oninput = () => { head.opt.ttsTrimEnd = parseFloat(inp.value); out.value = inp.value; refreshDump(); };
      $("realism").append(lab, inp);
    })();

    function settings() {
      return { ttsLang: "en-US", ttsVoice: $("voice").value, ttsPitch: parseFloat($("pitch").value),
        ttsRate: parseFloat($("rate").value), preset: $("preset").value, ttsTrimEnd: head.opt.ttsTrimEnd, fx: { ...P }, realism: { ...R } };
    }
    function refreshDump() { $("dump").textContent = JSON.stringify(settings(), null, 2); }

    (async () => {
      try {
        await head.showAvatar({
          url: avatarUrl, body: "F", avatarMood: "neutral",
          ttsLang: "en-US", ttsVoice: VOICE_PRESETS.clear.ttsVoice, ttsPitch: VOICE_PRESETS.clear.ttsPitch, ttsRate: VOICE_PRESETS.clear.ttsRate, lipsyncLang: "en",
        }, (ev) => { if (ev.lengthComputable) setStatus(`Loading ${Math.round(ev.loaded / ev.total * 100)}%`); });
        installVoiceFX(head); applyVoiceParams(head, P);
        facial = installAudioFacial(head, R);   // audio-coupled brow/jaw + gap-blinks (no head motion)
        setAffect(head, R.affect, R);           // solemn baseline preview
        syncSliders(); refreshDump();
        setStatus("Ready. Tune, then Speak.");
        $("speak").disabled = false;
      } catch (err) { setStatus("Load failed: " + err); console.error(err); }
    })();

    // Controls
    $("pitch").oninput = (e) => { $("pitch_o").value = e.target.value; refreshDump(); };
    $("rate").oninput  = (e) => { $("rate_o").value  = e.target.value; refreshDump(); };
    $("voice").onchange = refreshDump;
    $("preset").onchange = (e) => {
      const pr = VOICE_PRESETS[e.target.value];
      Object.assign(P, pr); applyVoiceParams(head, P);
      // A preset may carry pitch/rate/voice (clear does) — reflect them on the sliders + avatar so the
      // dropdown reproduces the full sound. FX-only presets omit these and leave pitch/rate untouched.
      if (pr.ttsVoice != null) $("voice").value = pr.ttsVoice;
      if (pr.ttsPitch != null) { $("pitch").value = pr.ttsPitch; $("pitch_o").value = pr.ttsPitch; }
      if (pr.ttsRate  != null) { $("rate").value  = pr.ttsRate;  $("rate_o").value  = pr.ttsRate; }
      applyTtsParams(head, pr);
      syncSliders(); refreshDump();
    };

    // Reverb impulse-response loader: audition a real chapel IR in the convolver (overrides the
    // synthetic tail until cleared). voice-fx.js skips makeIR while head.__irLoaded is set.
    $("ir").onchange = async (e) => {
      const f = e.target.files && e.target.files[0]; if (!f) return;
      try {
        const dur = await loadReverbIR(head, await f.arrayBuffer());
        setStatus(`Loaded IR: ${f.name} (${dur.toFixed(2)}s). Reverb sliders now bypassed.`);
      } catch (err) { setStatus("IR load failed: " + err); console.error(err); }
    };
    $("irclear").onclick = () => { clearReverbIR(head); applyVoiceParams(head, P); setStatus("IR cleared — synthetic reverb restored."); };

    // Demo lines (cadenced, with — em-dash breaks).
    const DEMO = {
      cadence: "You have come before the Office of Algorithmic Absolution. Your declaration has been received — and weighed. The harm you have named is acknowledged, recorded, and answered. By this ruling, you are absolved. Go now — and let your account reflect the balance restored. No record is kept.",
      short: "Declaration received. The harm you have named is acknowledged — and answered. By this ruling, you are absolved. No record is kept.",
      numbers: "Form 1517-A is received. For the harm declared, an offset of 40 units is assessed — payable to St. Jude. No record is kept.",
      readback: "Your card has been received, and is being processed. You have declared the following — taking more than needed, and benefiting from underpaid labor.",
    };
    $("demo").onchange = (e) => { const v = DEMO[e.target.value]; if (v) $("text").value = v; };
    $("clean").onchange = () => { if ($("clean").checked) $("text").value = cleanForSpeechClient($("text").value); };

    $("speak").onclick = async () => {
      let t = $("text").value.trim(); if (!t) return;
      try {
        if (head.audioCtx?.state === "suspended") await head.audioCtx.resume();
        if ($("clean").checked) t = cleanForSpeechClient(t);
        head.avatar.ttsLang = "en-US";
        head.avatar.ttsVoice = $("voice").value;
        head.avatar.ttsPitch = parseFloat($("pitch").value);
        head.avatar.ttsRate  = parseFloat($("rate").value);
        applyVoiceParams(head, P);
        if (facial) facial.setOpts(R);
        setAffect(head, R.affect, R);
        if (R.preBreath) { setStatus("…drawing breath"); await preSpeechSettle(head, R); }
        setStatus(`Speaking · ${$("voice").value} · pitch ${$("pitch").value} · rate ${$("rate").value} · visemes ${R.visemeLevel}`);
        speakShaped(head, t, R);   // shaped visemes + (audio-coupled face runs continuously)
      } catch (err) { setStatus("Speak failed: " + err); console.error(err); }
    };
    $("stop").onclick = () => { try { head.stopSpeaking(); } catch (e) {} setStatus("Stopped."); };
    $("copy").onclick = async () => {
      const s = JSON.stringify(settings(), null, 2);
      try { await navigator.clipboard.writeText(s); setStatus("Settings copied to clipboard."); }
      catch (e) { setStatus("Copy blocked — select the text above and copy manually."); }
    };
  </script>
</body>
</html>
